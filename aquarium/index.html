<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium Virtual Aquarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* === Root Variables & Global Resets === */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: rgba(0, 0, 0, 0.3);
            --glow-color-primary-rgb: 0, 255, 255;
            --text-color-light: #e0f7fa;
            --primary-accent: #00aaff;
            --secondary-accent: #00bcd4;
            --panel-width-desktop: 320px;
            --panel-width-mobile: 90vw;
            font-size: 16px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #0a192f;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            touch-action: none;
            color: var(--text-color-light);
        }

        .aquarium-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #112d4e, #0a192f);
            z-index: -2;
        }

        #aquarium-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* === Draggable Items === */
        .draggable-item {
            position: absolute;
            will-change: transform;
            cursor: grab;
            pointer-events: auto;
            z-index: 10;
        }
        .draggable-item.dragging { cursor: grabbing; z-index: 1000 !important; }
        .draggable-item img { display: block; width: 100%; pointer-events: none; }

        .item-controls {
            position: absolute;
            top: -50px; left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 1001;
        }
        .draggable-item.selected .item-controls {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) scale(1);
        }

        .item-controls button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* === UI Panels === */
        .ui-panel {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 8px 30px var(--glass-shadow);
            z-index: 2000;
        }

        #dashboard-panel {
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
        }

        #shop-panel {
            top: 20px; right: 20px;
            width: var(--panel-width-desktop);
            display: flex; flex-direction: column;
        }

        #shop-panel.hidden { display: none; }

        .shop-items-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .shop-item {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
        }
        .shop-item:hover { background: rgba(255,255,255,0.2); }
        .shop-item img { width: 100%; height: auto; }

        button {
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
        }

        /* Bubbles */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Toast */
        .toast-container {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%); z-index: 3000;
        }
        .toast {
            background: rgba(0,0,0,0.8); color: white;
            padding: 10px 20px; border-radius: 20px; margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="aquarium-background"></div>
    <div id="aquarium-container"></div>

    <div id="dashboard-panel" class="ui-panel">
        <button id="playMusicBtn">🎵 Music</button>
        <button id="toggleBubblesBtn">🫧 Bubbles</button>
        <button id="saveStateBtn">💾 Save</button>
        <button id="loadStateBtn">📂 Load</button>
        <button id="resetAquariumBtn" style="background: #ff4d4d;">🗑️ Reset</button>
    </div>

    <div id="shop-panel" class="ui-panel">
        <h3 style="font-family: Orbitron;">Shop</h3>
        <div class="shop-items-grid" id="fishShopItems"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <!-- Corrected raw audio link -->
    <audio id="backgroundMusic" src="https://github.com/tbrstructureshop-beep/yoga/raw/77ff863a2d8fd8ea235213389621a3a59853d817/aquarium/838fc208-2aa9-407e-ae4a-f7178acb7e65.mp3" loop></audio>

    <script>
        const ASSET_CONFIG = {
            fish: [
                { id: 'fish1', src: 'https://cdn-icons-png.flaticon.com/512/2906/2906323.png', name: 'Fish A', baseWidth: 80, scaleRange: [0.7, 1.3], speed: [1, 2] },
                { id: 'fish2', src: 'https://cdn-icons-png.flaticon.com/512/2906/2906314.png', name: 'Fish B', baseWidth: 90, scaleRange: [0.6, 1.2], speed: [1, 3] }
            ],
            ornaments: []
        };

        const DOM = {
            aquarium: document.getElementById('aquarium-container'),
            playMusicBtn: document.getElementById('playMusicBtn'),
            toggleBubblesBtn: document.getElementById('toggleBubblesBtn'),
            saveStateBtn: document.getElementById('saveStateBtn'),
            loadStateBtn: document.getElementById('loadStateBtn'),
            resetAquariumBtn: document.getElementById('resetAquariumBtn'),
            fishShop: document.getElementById('fishShopItems'),
            music: document.getElementById('backgroundMusic'),
            toasts: document.getElementById('toastContainer')
        };

        let state = {
            items: [],
            bubbles: [],
            isMusicPlaying: false,
            bubblesEnabled: true,
            selectedItem: null
        };

        // --- Utils ---
        const showToast = (msg) => {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            DOM.toasts.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        };

        // --- Logic ---
        const UIController = {
            init() {
                ASSET_CONFIG.fish.forEach(fish => {
                    const item = document.createElement('div');
                    item.className = 'shop-item';
                    item.innerHTML = `<img src="${fish.src}"><p>${fish.name}</p>`;
                    item.onclick = () => EntityManager.createFish(fish);
                    DOM.fishShop.appendChild(item);
                });

                DOM.playMusicBtn.onclick = this.toggleMusic;
                DOM.toggleBubblesBtn.onclick = this.toggleBubbles;
                DOM.saveStateBtn.onclick = Persistence.save;
                DOM.loadStateBtn.onclick = Persistence.load;
                DOM.resetAquariumBtn.onclick = EntityManager.reset;

                // Deselect on background click
                document.body.addEventListener('pointerdown', (e) => {
                    if (e.target === document.body || e.target === DOM.aquarium) {
                        if (state.selectedItem) state.selectedItem.deselect();
                    }
                });
            },
            toggleMusic() {
                state.isMusicPlaying = !state.isMusicPlaying;
                if (state.isMusicPlaying) {
                    DOM.music.play().catch(() => showToast("Click again to enable audio"));
                    DOM.playMusicBtn.textContent = "🔇 Mute";
                } else {
                    DOM.music.pause();
                    DOM.playMusicBtn.textContent = "🎵 Music";
                }
            },
            toggleBubbles() {
                state.bubblesEnabled = !state.bubblesEnabled;
                DOM.toggleBubblesBtn.textContent = state.bubblesEnabled ? "🫧 Bubbles" : "🚫 Bubbles";
                state.bubbles.forEach(b => b.style.display = state.bubblesEnabled ? 'block' : 'none');
            },
            // Fixed the missing methods that were causing the crash
            setMusicState(playing) {
                if (playing) {
                    state.isMusicPlaying = false; 
                    this.toggleMusic();
                }
            },
            setBubblesState(enabled) {
                if (!enabled) {
                    state.bubblesEnabled = true;
                    this.toggleBubbles();
                }
            }
        };

        class Fish {
            constructor(config, savedData = null) {
                this.config = config;
                this.element = document.createElement('div');
                this.element.className = 'draggable-item';
                this.img = document.createElement('img');
                this.img.src = config.src;
                this.element.appendChild(this.img);

                // Controls
                this.controls = document.createElement('div');
                this.controls.className = 'item-controls';
                const del = document.createElement('button');
                del.textContent = "🗑️";
                del.onclick = (e) => { e.stopPropagation(); this.remove(); };
                this.controls.appendChild(del);
                this.element.appendChild(this.controls);

                DOM.aquarium.appendChild(this.element);

                // State
                this.x = savedData ? savedData.x : Math.random() * window.innerWidth;
                this.y = savedData ? savedData.y : Math.random() * window.innerHeight;
                this.scale = savedData ? savedData.scale : 1;
                this.dir = Math.random() > 0.5 ? 1 : -1;
                this.speed = Math.random() * (config.speed[1] - config.speed[0]) + config.speed[0];

                this.setupEvents();
                this.update();
            }

            setupEvents() {
                this.element.onpointerdown = (e) => {
                    e.stopPropagation();
                    if (state.selectedItem) state.selectedItem.deselect();
                    state.selectedItem = this;
                    this.element.classList.add('selected');
                    this.isDragging = true;
                    this.offsetX = e.clientX - this.x;
                    this.offsetY = e.clientY - this.y;
                    this.element.setPointerCapture(e.pointerId);
                };

                this.element.onpointermove = (e) => {
                    if (!this.isDragging) return;
                    this.x = e.clientX - this.offsetX;
                    this.y = e.clientY - this.offsetY;
                };

                this.element.onpointerup = () => {
                    this.isDragging = false;
                };
            }

            deselect() {
                this.element.classList.remove('selected');
                state.selectedItem = null;
            }

            remove() {
                this.element.remove();
                state.items = state.items.filter(i => i !== this);
            }

            update() {
                if (!this.isDragging) {
                    this.x += this.speed * this.dir;
                    if (this.x > window.innerWidth) this.dir = -1;
                    if (this.x < -100) this.dir = 1;
                    this.y += Math.sin(Date.now() * 0.002) * 0.5;
                }
                this.element.style.width = this.config.baseWidth + 'px';
                this.element.style.transform = `translate(${this.x}px, ${this.y}px) scaleX(${this.dir})`;
            }
        }

        const EntityManager = {
            createFish(config, data = null) {
                const f = new Fish(config, data);
                state.items.push(f);
                return f;
            },
            reset() {
                state.items.forEach(i => i.element.remove());
                state.items = [];
                showToast("Aquarium Reset");
            }
        };

        const Persistence = {
            save() {
                const data = {
                    music: state.isMusicPlaying,
                    bubbles: state.bubblesEnabled,
                    fish: state.items.map(i => ({ id: i.config.id, x: i.x, y: i.y, scale: i.scale }))
                };
                localStorage.setItem('aquarium_save', JSON.stringify(data));
                showToast("Saved!");
            },
            load() {
                const raw = localStorage.getItem('aquarium_save');
                if (!raw) return showToast("No save found");
                const data = JSON.parse(raw);
                EntityManager.reset();
                data.fish.forEach(fData => {
                    const config = ASSET_CONFIG.fish.find(c => c.id === fData.id);
                    if (config) EntityManager.createFish(config, fData);
                });
                UIController.setMusicState(data.music);
                UIController.setBubblesState(data.bubbles);
                showToast("Loaded!");
            }
        };

        // --- Loop ---
        function loop() {
            state.items.forEach(i => i.update());
            requestAnimationFrame(loop);
        }

        // Init Bubbles
        for(let i=0; i<20; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 10 + 5;
            b.style.width = b.style.height = size + 'px';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.bottom = '-20px';
            b.style.transition = `bottom ${Math.random()*5 + 5}s linear, opacity 2s`;
            DOM.aquarium.appendChild(b);
            state.bubbles.push(b);
            
            setInterval(() => {
                b.style.bottom = '110vh';
                setTimeout(() => { b.style.bottom = '-20px'; }, 10000);
            }, Math.random() * 5000);
        }

        UIController.init();
        loop();
    </script>
</body>
</html>
