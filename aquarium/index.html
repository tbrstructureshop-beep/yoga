<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium Virtual Aquarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* === Root Variables & Global Resets === */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: rgba(0, 0, 0, 0.25);
            --glow-color-primary-rgb: 0, 255, 255;
            --text-color-light: #e0f7fa;
            --primary-accent: #00aaff;
            --secondary-accent: #00bcd4;
            --panel-width-desktop: 320px;
            --panel-width-mobile: 90vw;
            --padding-base: 15px;
            --gap-base: 10px;
            font-size: 16px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #0a192f;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            touch-action: none;
            color: var(--text-color-light);
        }

        /* === Aquarium Background === */
        .aquarium-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('../background/background1.png');
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: brightness(0.8) saturate(1.2);
        }

        .aquarium-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at bottom, rgba(0, 70, 150, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        #aquarium-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* === Draggable Items === */
        .draggable-item {
            position: absolute;
            will-change: transform;
            cursor: grab;
            z-index: 10;
        }
        .draggable-item.dragging { cursor: grabbing; z-index: 1000 !important; }
        .draggable-item.selected { box-shadow: 0 0 15px rgba(0, 255, 255, 0.5); border-radius: 10px; }
        .draggable-item img { display: block; width: 100%; pointer-events: none; }

        .item-controls {
            position: absolute;
            top: -50px; left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 5px 10px;
            display: flex;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .draggable-item.selected .item-controls { opacity: 1; pointer-events: auto; }
        .item-controls button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            border-radius: 5px;
            padding: 2px 8px;
            cursor: pointer;
        }

        /* === UI Panels === */
        .ui-panel {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: var(--padding-base);
            box-shadow: 0 8px 30px var(--glass-shadow);
            z-index: 100;
        }

        #dashboard-panel {
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px;
        }

        #shop-panel {
            top: 20px; right: 20px;
            width: var(--panel-width-desktop);
            max-height: 80vh;
            overflow-y: auto;
        }

        .shop-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .shop-tabs button {
            flex: 1; padding: 8px; background: rgba(255,255,255,0.1);
            color: white; border: 1px solid var(--glass-border); border-radius: 10px;
        }
        .shop-tabs button.active { background: var(--primary-accent); }

        .shop-items-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .shop-item {
            background: rgba(255,255,255,0.05); border-radius: 10px; padding: 5px;
            cursor: pointer; text-align: center; transition: 0.2s;
        }
        .shop-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-3px); }
        .shop-item img { width: 100%; height: auto; }
        .hidden { display: none !important; }

        /* Bubbles */
        .bubble {
            position: absolute; background: rgba(255, 255, 255, 0.3);
            border-radius: 50%; pointer-events: none; z-index: 1;
        }

        /* Modal */
        .item-preview-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: #1a3a5a; padding: 30px; border-radius: 20px; text-align: center;
            border: 1px solid var(--primary-accent);
        }
        .modal-item-preview-img { max-width: 150px; margin: 20px 0; }
        
        /* Toast */
        .toast-container { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 3000; }
        .toast { background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; margin-bottom: 5px; }

        button { cursor: pointer; font-family: inherit; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div class="aquarium-background"></div>
    <div class="aquarium-overlay"></div>
    <div id="aquarium-container"></div>

    <div id="dashboard-panel" class="ui-panel">
        <button id="playMusicBtn">🎵 Music</button>
        <button id="toggleBubblesBtn">🫧 Bubbles</button>
        <button id="saveStateBtn">💾 Save</button>
        <button id="loadStateBtn">📂 Load</button>
        <button id="resetAquariumBtn" style="background: rgba(255,0,0,0.3);">🗑️ Reset</button>
    </div>

    <div id="shop-panel" class="ui-panel">
        <h3 style="margin-bottom: 10px; font-family: Orbitron;">Aquarium Shop</h3>
        <div class="shop-tabs">
            <button id="tabFish" class="active">Fish</button>
            <button id="tabOrnaments">Ornaments</button>
        </div>
        <div id="fishShopItems" class="shop-items-grid"></div>
        <div id="ornamentShopItems" class="shop-items-grid hidden"></div>
    </div>

    <!-- Modal -->
    <div id="itemPreviewModal" class="item-preview-modal hidden">
        <div class="modal-content">
            <h2 id="modalItemName" style="font-family: Orbitron;">Item Name</h2>
            <img id="modalItemPreview" class="modal-item-preview-img">
            <div id="quantityControl" style="margin-bottom: 20px;">
                <button onclick="adjustQty(-1)">-</button>
                <input type="number" id="modalQty" value="1" style="width: 50px; text-align: center; background: none; color: white; border: 1px solid white;">
                <button onclick="adjustQty(1)">+</button>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="modalAddBtn" style="background: var(--primary-accent); color: white; padding: 10px 20px;">Add to Aquarium</button>
                <button id="modalCloseBtn" style="background: #444; color: white; padding: 10px 20px;">Cancel</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <audio id="backgroundMusic" src="https://github.com/tbrstructureshop-beep/yoga/raw/77ff863a2d8fd8ea235213389621a3a59853d817/aquarium/838fc208-2aa9-407e-ae4a-f7178acb7e65.mp3" loop></audio>

    <script>
        const ASSET_CONFIG = {
            fish: [
                { id: 'fish1', src: '../fish/fish1.png', name: 'Tropical Fish', baseWidth: 80, scaleRange: [0.7, 1.3], speed: [1, 2.5] }
            ],
            ornaments: [
                { id: 'ornament1', src: '../ornamen/ornamen1.png', name: 'Coral A', baseWidth: 100, scaleRange: [0.8, 1.5] },
                { id: 'ornament2', src: '../ornamen/ornamen2.png', name: 'Seaweed', baseWidth: 80, scaleRange: [0.7, 1.2] },
                { id: 'ornament3', src: '../ornamen/ornamen3.png', name: 'Treasure', baseWidth: 90, scaleRange: [0.9, 1.1] },
                { id: 'ornament4', src: '../ornamen/ornamen4.png', name: 'Volcano', baseWidth: 120, scaleRange: [1.0, 1.5] }
            ]
        };

        let state = {
            items: [],
            bubbles: [],
            isMusicPlaying: false,
            bubblesEnabled: true,
            selectedItem: null,
            modalItem: null
        };

        const showToast = (msg) => {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 2500);
        };

        const adjustQty = (val) => {
            const input = document.getElementById('modalQty');
            let n = parseInt(input.value) + val;
            input.value = n < 1 ? 1 : n;
        };

        // --- Controller ---
        const UIController = {
            init() {
                this.renderShop();
                document.getElementById('tabFish').onclick = () => this.switchTab('fish');
                document.getElementById('tabOrnaments').onclick = () => this.switchTab('ornamen');
                document.getElementById('playMusicBtn').onclick = () => this.toggleMusic();
                document.getElementById('toggleBubblesBtn').onclick = () => this.toggleBubbles();
                document.getElementById('saveStateBtn').onclick = () => Persistence.save();
                document.getElementById('loadStateBtn').onclick = () => Persistence.load();
                document.getElementById('resetAquariumBtn').onclick = () => EntityManager.reset();
                document.getElementById('modalCloseBtn').onclick = () => this.hideModal();
                document.getElementById('modalAddBtn').onclick = () => this.confirmAdd();

                // Deselect logic
                document.addEventListener('pointerdown', (e) => {
                    if (e.target.id === 'aquarium-container') {
                        if (state.selectedItem) state.selectedItem.deselect();
                    }
                });
            },

            renderShop() {
                const fishGrid = document.getElementById('fishShopItems');
                const ornaGrid = document.getElementById('ornamentShopItems');

                ASSET_CONFIG.fish.forEach(f => {
                    const el = this.createShopEl(f, 'fish');
                    fishGrid.appendChild(el);
                });

                ASSET_CONFIG.ornaments.forEach(o => {
                    const el = this.createShopEl(o, 'ornament');
                    ornaGrid.appendChild(el);
                });
            },

            createShopEl(asset, type) {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `<img src="${asset.src}"><small>${asset.name}</small>`;
                div.onclick = () => this.showModal(asset, type);
                return div;
            },

            switchTab(type) {
                document.getElementById('tabFish').classList.toggle('active', type === 'fish');
                document.getElementById('tabOrnaments').classList.toggle('active', type === 'ornamen');
                document.getElementById('fishShopItems').classList.toggle('hidden', type !== 'fish');
                document.getElementById('ornamentShopItems').classList.toggle('hidden', type !== 'ornamen');
            },

            showModal(asset, type) {
                state.modalItem = { asset, type };
                document.getElementById('modalItemName').textContent = asset.name;
                document.getElementById('modalItemPreview').src = asset.src;
                document.getElementById('modalQty').value = 1;
                document.getElementById('quantityControl').classList.toggle('hidden', type === 'ornament');
                document.getElementById('itemPreviewModal').classList.remove('hidden');
            },

            hideModal() {
                document.getElementById('itemPreviewModal').classList.add('hidden');
            },

            confirmAdd() {
                const qty = parseInt(document.getElementById('modalQty').value);
                for(let i=0; i<qty; i++) {
                    EntityManager.create(state.modalItem.asset, state.modalItem.type);
                }
                showToast(`Added ${qty} ${state.modalItem.asset.name}`);
                this.hideModal();
            },

            toggleMusic() {
                state.isMusicPlaying = !state.isMusicPlaying;
                const audio = document.getElementById('backgroundMusic');
                if (state.isMusicPlaying) {
                    audio.play().catch(() => showToast("Interact with page first"));
                    document.getElementById('playMusicBtn').textContent = "🔇 Mute";
                } else {
                    audio.pause();
                    document.getElementById('playMusicBtn').textContent = "🎵 Music";
                }
            },

            toggleBubbles() {
                state.bubblesEnabled = !state.bubblesEnabled;
                document.getElementById('toggleBubblesBtn').textContent = state.bubblesEnabled ? "🫧 Bubbles" : "🚫 Bubbles";
                state.bubbles.forEach(b => b.style.display = state.bubblesEnabled ? 'block' : 'none');
            },

            setMusicState(playing) {
                if (playing !== state.isMusicPlaying) this.toggleMusic();
            },

            setBubblesState(enabled) {
                if (enabled !== state.bubblesEnabled) this.toggleBubbles();
            }
        };

        // --- Entity Logic ---
        class Entity {
            constructor(asset, type, data = null) {
                this.asset = asset;
                this.type = type;
                this.element = document.createElement('div');
                this.element.className = 'draggable-item';
                this.img = document.createElement('img');
                this.img.src = asset.src;
                this.element.appendChild(this.img);

                this.controls = document.createElement('div');
                this.controls.className = 'item-controls';
                this.controls.innerHTML = `<button class="del">🗑️</button>`;
                this.controls.querySelector('.del').onclick = (e) => { e.stopPropagation(); this.remove(); };
                this.element.appendChild(this.controls);

                document.getElementById('aquarium-container').appendChild(this.element);

                this.x = data ? data.x : Math.random() * (window.innerWidth - 100);
                this.y = data ? data.y : Math.random() * (window.innerHeight - 100);
                this.scale = data ? data.scale : (Math.random() * (asset.scaleRange[1] - asset.scaleRange[0]) + asset.scaleRange[0]);
                this.dir = data ? data.dir : (Math.random() > 0.5 ? 1 : -1);
                this.speed = asset.speed ? (Math.random() * (asset.speed[1] - asset.speed[0]) + asset.speed[0]) : 0;

                this.initEvents();
                this.render();
            }

            initEvents() {
                this.element.onpointerdown = (e) => {
                    e.stopPropagation();
                    if (state.selectedItem) state.selectedItem.deselect();
                    state.selectedItem = this;
                    this.element.classList.add('selected');
                    this.isDragging = true;
                    this.offX = e.clientX - this.x;
                    this.offY = e.clientY - this.y;
                    this.element.setPointerCapture(e.pointerId);
                };
                this.element.onpointermove = (e) => {
                    if (!this.isDragging) return;
                    this.x = e.clientX - this.offX;
                    this.y = e.clientY - this.offY;
                    this.render();
                };
                this.element.onpointerup = () => this.isDragging = false;
            }

            deselect() {
                this.element.classList.remove('selected');
                state.selectedItem = null;
            }

            remove() {
                this.element.remove();
                state.items = state.items.filter(i => i !== this);
            }

            update() {
                if (this.type === 'fish' && !this.isDragging) {
                    this.x += this.speed * this.dir;
                    if (this.x > window.innerWidth) this.dir = -1;
                    if (this.x < -100) this.dir = 1;
                    this.render();
                }
            }

            render() {
                this.element.style.width = (this.asset.baseWidth * this.scale) + 'px';
                const flip = this.type === 'fish' ? `scaleX(${this.dir})` : '';
                this.element.style.transform = `translate(${this.x}px, ${this.y}px) ${flip}`;
                this.element.style.zIndex = Math.floor(this.y);
            }
        }

        const EntityManager = {
            create(asset, type, data = null) {
                const e = new Entity(asset, type, data);
                state.items.push(e);
            },
            reset() {
                state.items.forEach(i => i.element.remove());
                state.items = [];
                showToast("Aquarium Cleared");
            }
        };

        const Persistence = {
            save() {
                const data = {
                    music: state.isMusicPlaying,
                    bubbles: state.bubblesEnabled,
                    items: state.items.map(i => ({ id: i.asset.id, type: i.type, x: i.x, y: i.y, scale: i.scale, dir: i.dir }))
                };
                localStorage.setItem('aqua_premium_save', JSON.stringify(data));
                showToast("Layout Saved");
            },
            load() {
                const raw = localStorage.getItem('aqua_premium_save');
                if (!raw) return showToast("No save found");
                const data = JSON.parse(raw);
                EntityManager.reset();
                data.items.forEach(d => {
                    const asset = [...ASSET_CONFIG.fish, ...ASSET_CONFIG.ornaments].find(a => a.id === d.id);
                    if (asset) EntityManager.create(asset, d.type, d);
                });
                UIController.setMusicState(data.music);
                UIController.setBubblesState(data.bubbles);
                showToast("Layout Loaded");
            }
        };

        // --- Init ---
        function createBubbles() {
            for(let i=0; i<15; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const s = Math.random() * 15 + 5;
                b.style.width = b.style.height = s + 'px';
                b.style.left = Math.random() * 100 + 'vw';
                b.style.bottom = '-50px';
                document.getElementById('aquarium-container').appendChild(b);
                state.bubbles.push(b);
                
                const animate = () => {
                    const dur = Math.random() * 4000 + 4000;
                    b.animate([
                        { transform: `translateY(0) translateX(0)`, opacity: 0.6 },
                        { transform: `translateY(-110vh) translateX(${Math.random()*50-25}px)`, opacity: 0 }
                    ], { duration: dur, iterations: Infinity, delay: Math.random() * 5000 });
                };
                animate();
            }
        }

        function loop() {
            state.items.forEach(i => i.update());
            requestAnimationFrame(loop);
        }

        UIController.init();
        createBubbles();
        loop();

        // Default Fish
        setTimeout(() => {
            if (state.items.length === 0) EntityManager.create(ASSET_CONFIG.fish[0], 'fish');
        }, 500);

    </script>
</body>
</html>
