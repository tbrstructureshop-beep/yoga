<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Aquarium</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: rgba(0, 0, 0, 0.1);
            --selected-glow: 0 0 10px 5px rgba(0, 255, 255, 0.7), 0 0 20px 10px rgba(0, 200, 200, 0.5);
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000; /* Fallback for background */
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: default; /* Default cursor */
            user-select: none; /* Prevent text selection during drag */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            touch-action: none; /* Prevent browser touch actions like pull-to-refresh, pinch-zoom on body */
        }

        .aquarium-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background/background1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2; /* Below overlay and content */
        }

        .aquarium-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, rgba(0, 70, 150, 0.2) 0%, rgba(0, 0, 0, 0) 70%),
                        linear-gradient(to top, rgba(0, 100, 200, 0.1) 0%, rgba(0, 10, 30, 0.2) 100%);
            z-index: -1; /* Above background, below content */
            pointer-events: none; /* Allows clicks to pass through to elements below */
        }

        #aquarium-container {
            position: absolute;
            width: 100%;
            height: 100%;
            /* touch-action on body should cover this, but explicit can't hurt */
        }

        .draggable-item { /* New class for common draggable properties */
            position: absolute;
            will-change: transform, left, top;
            touch-action: none; /* Crucial for drag and drop on touch devices */
            z-index: 1; /* Default for items */
            cursor: grab; /* Indicate draggable */
            transition: box-shadow 0.2s ease-out; /* Smooth glow */
            transform-origin: center center; /* Default for fish, can be overridden */
        }

        .ornament-wrapper {
            transform-origin: bottom center; /* Scale from bottom for ornaments */
            z-index: 1; /* Default for ornaments */
        }

        .fish {
            z-index: 2; /* Fish are above ornaments by default */
        }


        .draggable-item.dragging {
            cursor: grabbing;
            z-index: 100; /* Bring to front when dragging */
        }

        .draggable-item.selected {
            box-shadow: var(--selected-glow);
            z-index: 50; /* Bring to front when selected */
        }

        .draggable-item img {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none; /* Allow events to pass to wrapper for drag */
        }

        .item-controls { /* New class for common control properties */
            position: absolute;
            top: -30px; /* Position above the item */
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 5px 10px;
            display: flex;
            gap: 5px;
            box-shadow: 0 2px 5px var(--glass-shadow);
            opacity: 0;
            pointer-events: none; /* Controls are not interactive when not selected */
            transition: opacity 0.2s ease-out;
            z-index: 51; /* Above the item */
            white-space: nowrap; /* Prevent buttons from wrapping */
            touch-action: auto; /* Allow interaction with slider/buttons within controls */
        }

        .draggable-item.selected .item-controls {
            opacity: 1;
            pointer-events: auto; /* Controls become interactive when selected */
        }

        .item-controls button, .item-controls input[type="range"] {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #333;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            transition: all 0.1s ease;
            touch-action: manipulation; /* Optimizes touch for these interactive elements */
        }
        .item-controls button {
            padding: 5px 8px;
        }

        .item-controls button:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .item-controls input[type="range"] {
            width: 80px;
            -webkit-appearance: none;
            height: 8px;
            margin: 0 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            border-radius: 4px;
        }

        .item-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00aaff;
            cursor: grab; /* Indicate draggable thumb */
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        .item-controls input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00aaff;
            cursor: grab; /* Indicate draggable thumb */
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        /* Original fish class is now inherited from draggable-item */


        .bubble {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0; /* Below fish and ornaments */
            filter: blur(0.5px);
            will-change: transform, opacity;
        }

        /* UI Controls - Glassmorphism Style */
        .controls-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* For Safari */
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 10px var(--glass-shadow);
            z-index: 10;
            user-select: none; /* Prevent text selection */
        }

        .controls-panel button {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #333;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px); /* Ensure button background is also blurred */
            touch-action: manipulation; /* Optimize touch for buttons */
        }

        .controls-panel button:hover {
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transform: translateY(-1px);
        }

        .controls-panel button:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* Ornament Shop Panel */
        .shop-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 10px var(--glass-shadow);
            z-index: 10;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shop-panel h3 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 1.1em;
            text-align: center;
        }

        .shop-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .shop-item {
            width: 60px; /* Thumbnail size */
            height: 60px;
            border: 2px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation; /* Optimize touch for shop items */
        }

        .shop-item:hover {
            border-color: #00aaff;
            box-shadow: 0 0 5px rgba(0, 170, 255, 0.5);
        }

        .shop-item img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            display: block;
            pointer-events: none; /* Images within shop items should not interfere with click */
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .controls-panel {
                top: 10px;
                right: 10px;
                padding: 10px;
                gap: 5px;
            }
            .controls-panel button {
                padding: 8px 12px;
                font-size: 0.8em;
            }

            .shop-panel {
                top: 10px;
                left: 10px;
                padding: 10px;
                gap: 8px;
            }
            .shop-panel h3 {
                font-size: 1em;
                margin-bottom: 5px;
            }
            .shop-items {
                gap: 5px;
            }
            .shop-item {
                width: 50px;
                height: 50px;
            }

            /* Adjust item controls for smaller screens */
            .item-controls {
                transform: translateX(-50%) scale(0.8);
                top: -25px;
            }
        }
    </style>
</head>
<body>

    <div class="aquarium-background"></div>
    <div class="aquarium-overlay"></div>

    <div id="aquarium-container">
        <!-- Ornaments will be injected here by JS -->
        <!-- Fish will be injected here by JS -->
        <!-- Bubbles will be injected here by JS -->
    </div>

    <div class="controls-panel">
        <button id="playMusicBtn">Play Music</button> <!-- NEW MUSIC BUTTON -->
        <button id="addFishBtn">Add Fish</button>
        <button id="removeFishBtn">Remove Fish</button>
        <button id="toggleBubblesBtn">Toggle Bubbles</button>
    </div>

    <div class="shop-panel">
        <h3>Ornament Shop</h3>
        <div class="shop-items" id="shopItems">
            <!-- Shop items will be generated here by JS -->
        </div>
    </div>

    <!-- Looped background music -->
    <audio id="backgroundMusic" src="838fc208-2aa9-407e-ae4a-f7178acb7e65.mp3" loop></audio> <!-- REMOVED AUTOPLAY -->

    <script>
        const aquariumContainer = document.getElementById('aquarium-container');
        const playMusicBtn = document.getElementById('playMusicBtn');
        const addFishBtn = document.getElementById('addFishBtn');
        const removeFishBtn = document.getElementById('removeFishBtn');
        const toggleBubblesBtn = document.getElementById('toggleBubblesBtn');
        const shopItemsDiv = document.getElementById('shopItems');
        const backgroundMusic = document.getElementById('backgroundMusic');

        const ornamentImageSources = [
            'ornamen/ornamen1.png',
            'ornamen/ornamen2.png',
            'ornamen/ornamen3.png',
            'ornamen/ornamen4.png'
        ];
        const fishImage = 'fish/fish1.png';

        const maxFish = 10;
        const maxOrnaments = 20;

        let fishCount = 0;
        let fishArray = [];
        let ornamentsArray = [];
        let bubblesArray = [];
        let bubblesEnabled = true;

        let selectedItem = null; // Can be an Ornament or a Fish

        // --- Utility Functions ---
        function getRandom(min, max) {
            return Math.random() * (max - min) + min;
        }
        function debounce(func, delay) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), delay);
            };
        }

        // --- Base DraggableItem Class ---
        class DraggableItem {
            constructor(src, className, transformOrigin = 'center center') {
                this.src = src;
                this.element = document.createElement('div');
                this.element.classList.add('draggable-item', className);
                this.element.style.transformOrigin = transformOrigin; // Set transform-origin here
                aquariumContainer.appendChild(this.element);

                this.img = document.createElement('img');
                this.img.src = src;
                this.img.classList.add('item-image'); // Generic image class
                this.element.appendChild(this.img);

                this.controls = this.createControls();
                this.element.appendChild(this.controls);

                this.x = 0;
                this.y = 0;
                this.scale = 1;
                this.isDragging = false;
                this.offsetX = 0;
                this.offsetY = 0;

                this.addEventListeners();
                this.deselect();
            }

            createControls() {
                const controlsDiv = document.createElement('div');
                controlsDiv.classList.add('item-controls');

                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '❌';
                deleteBtn.title = 'Delete Item';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.remove();
                });
                controlsDiv.appendChild(deleteBtn);

                const resizeSlider = document.createElement('input');
                resizeSlider.type = 'range';
                resizeSlider.min = '0.5';
                resizeSlider.max = '2.0';
                resizeSlider.step = '0.05';
                resizeSlider.value = this.scale.toString();
                resizeSlider.title = 'Resize';
                resizeSlider.addEventListener('input', (e) => {
                    this.scale = parseFloat(e.target.value);
                    this.applyTransform();
                });
                resizeSlider.addEventListener('mousedown', (e) => e.stopPropagation());
                resizeSlider.addEventListener('touchstart', (e) => e.stopPropagation());
                controlsDiv.appendChild(resizeSlider);

                return controlsDiv;
            }

            addEventListeners() {
                this.element.addEventListener('mousedown', this.onStartDrag.bind(this));
                this.element.addEventListener('touchstart', this.onStartDrag.bind(this), { passive: false });
            }

            initPositionAndSize(initialX = null, initialY = null) {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                // Default width, can be overridden by subclasses
                const baseWidth = getRandom(viewportWidth * 0.1, viewportWidth * 0.25);
                this.element.style.width = `${baseWidth}px`;
                this.element.style.height = 'auto'; // Maintain aspect ratio

                const applyInitialPosition = () => {
                    const itemWidth = this.img.clientWidth;
                    const itemHeight = this.img.clientHeight;

                    this.scale = 1;
                    const resizeSlider = this.controls.querySelector('input[type="range"]');
                    if (resizeSlider) resizeSlider.value = this.scale.toString();

                    if (initialX !== null && initialY !== null) {
                        this.x = initialX - itemWidth / 2;
                        this.y = initialY - itemHeight / 2;
                    } else {
                        this.x = (viewportWidth / 2) - (itemWidth / 2);
                        this.y = (viewportHeight / 2) - (itemHeight / 2);
                    }
                    this.applyTransform();
                };

                this.img.onload = applyInitialPosition;
                if (this.img.complete) {
                    applyInitialPosition();
                }
            }

            applyTransform() {
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                // Combine scale and potential drift/flip for subclasses
                let currentTransform = `scale(${this.scale})`;
                // Subclasses can add more to currentTransform before setting it
                this.element.style.transform = currentTransform;
            }

            select() {
                if (selectedItem && selectedItem !== this) {
                    selectedItem.deselect();
                }
                this.element.classList.add('selected');
                this.element.style.zIndex = 50;
                selectedItem = this;
            }

            deselect() {
                this.element.classList.remove('selected');
                // Revert to default z-index, specific to ornament/fish
                if (this instanceof Ornament) {
                    this.element.style.zIndex = 1;
                } else if (this instanceof Fish) {
                    this.element.style.zIndex = 2;
                }
                if (selectedItem === this) {
                    selectedItem = null;
                }
            }

            onStartDrag(e) {
                if (e.target.closest('.item-controls')) {
                    return;
                }

                e.preventDefault();
                this.select();

                this.isDragging = true;
                this.element.classList.add('dragging');
                this.element.style.zIndex = 100;

                let clientX, clientY;
                if (e.type === 'touchstart') {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const rect = this.element.getBoundingClientRect();
                this.offsetX = clientX - rect.left;
                this.offsetY = clientY - rect.top;

                document.addEventListener('mousemove', this.onDragBound);
                document.addEventListener('mouseup', this.onStopDragBound);
                document.addEventListener('touchmove', this.onDragBound, { passive: false });
                document.addEventListener('touchend', this.onStopDragBound);
            }

            onDrag(e) {
                if (!this.isDragging) return;

                let clientX, clientY;
                if (e.type === 'touchmove') {
                    if (e.touches.length > 1) {
                        this.onStopDrag(e);
                        return;
                    }
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                this.x = clientX - this.offsetX;
                this.y = clientY - this.offsetY;

                const scaledWidth = this.element.clientWidth * this.scale;
                const scaledHeight = this.element.clientHeight * this.scale;
                this.x = Math.max(0, Math.min(this.x, window.innerWidth - scaledWidth));
                this.y = Math.max(0, Math.min(this.y, window.innerHeight - scaledHeight));

                this.applyTransform();
            }

            onStopDrag(e) {
                this.isDragging = false;
                this.element.classList.remove('dragging');
                this.element.style.zIndex = 50;

                document.removeEventListener('mousemove', this.onDragBound);
                document.removeEventListener('mouseup', this.onStopDragBound);
                document.removeEventListener('touchmove', this.onDragBound);
                document.removeEventListener('touchend', this.onStopDragBound);
            }

            remove() {
                this.element.remove();
                if (selectedItem === this) {
                    selectedItem = null;
                }
            }
        }
        // Bind functions once in constructor to maintain 'this' context
        DraggableItem.prototype.onDragBound = null;
        DraggableItem.prototype.onStopDragBound = null;


        // --- Ornament Class (inherits from DraggableItem) ---
        class Ornament extends DraggableItem {
            constructor(src) {
                super(src, 'ornament-wrapper', 'bottom center');
                this.initPositionAndSize();
                this.onDragBound = this.onDrag.bind(this);
                this.onStopDragBound = this.onStopDrag.bind(this);
            }

            initPositionAndSize(initialX = null, initialY = null) {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                const baseWidth = getRandom(viewportWidth * 0.12, viewportWidth * 0.28);
                this.element.style.width = `${baseWidth}px`;
                this.element.style.height = 'auto';

                const applyInitialPosition = () => {
                    const ornamentHeight = this.img.clientHeight;
                    const ornamentWidth = this.img.clientWidth;

                    this.scale = getRandom(0.7, 1.3); // Random initial scale for ornaments
                    const resizeSlider = this.controls.querySelector('input[type="range"]');
                    if (resizeSlider) resizeSlider.value = this.scale.toString();

                    if (initialX !== null && initialY !== null) {
                        this.x = initialX - ornamentWidth / 2;
                        this.y = initialY - ornamentHeight / 2;
                    } else {
                        // Place ornaments near the bottom
                        this.x = getRandom(0, viewportWidth - ornamentWidth);
                        this.y = viewportHeight - ornamentHeight - (viewportHeight * 0.05);
                    }
                    this.applyTransform();
                };

                this.img.onload = applyInitialPosition;
                if (this.img.complete) {
                     applyInitialPosition();
                }
            }

            applyTransform() {
                const drift = Math.sin(performance.now() * 0.0001) * 5;
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                this.element.style.transform = `scale(${this.scale}) translateX(${drift}px)`;
            }

            remove() {
                super.remove();
                ornamentsArray = ornamentsArray.filter(orn => orn !== this);
            }
        }


        // --- Ornament Shop ---
        function generateShopItems() {
            shopItemsDiv.innerHTML = '';
            ornamentImageSources.forEach(src => {
                const shopItem = document.createElement('div');
                shopItem.classList.add('shop-item');
                shopItem.title = src.split('/').pop().split('.')[0].replace(/(\d)/, ' $1');

                const img = document.createElement('img');
                img.src = src;
                shopItem.appendChild(img);

                shopItem.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (ornamentsArray.length < maxOrnaments) {
                        const newOrnament = new Ornament(src);
                        ornamentsArray.push(newOrnament);
                        newOrnament.select();
                    } else {
                        alert(`Maximum ${maxOrnaments} ornaments reached for performance!`);
                    }
                });
                shopItemsDiv.appendChild(shopItem);
            });
        }


        // --- Fish Class (inherits from DraggableItem) ---
        class Fish extends DraggableItem {
            constructor() {
                super(fishImage, 'fish');
                this.onDragBound = this.onDrag.bind(this);
                this.onStopDragBound = this.onStopDrag.bind(this);
                this.isAutomated = true; // Fish start in automated movement mode
                this.initPositionAndSize();
            }

            initPositionAndSize() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                this.size = getRandom(viewportWidth * 0.04, viewportWidth * 0.1);
                this.speed = getRandom(0.5, 2);
                this.amplitude = getRandom(viewportHeight * 0.01, viewportHeight * 0.03);
                this.frequency = getRandom(0.02, 0.05);
                this.phase = getRandom(0, Math.PI * 2);

                this.element.style.width = `${this.size}px`;

                // Initial direction and position
                this.direction = Math.random() < 0.5 ? 1 : -1; // 1 for right, -1 for left
                this.x = this.direction === 1 ? -this.size : viewportWidth;
                this.y = getRandom(viewportHeight * 0.1, viewportHeight * 0.7);

                this.scale = getRandom(0.8, 1.2); // Random initial scale for fish
                const resizeSlider = this.controls.querySelector('input[type="range"]');
                if (resizeSlider) resizeSlider.value = this.scale.toString();

                this.applyTransform();
            }

            // Override onStartDrag to pause automation and select fish
            onStartDrag(e) {
                super.onStartDrag(e);
                this.isAutomated = false; // Pause automation when dragging
            }

            // Override onStopDrag to potentially resume automation (or keep manual)
            onStopDrag(e) {
                super.onStopDrag(e);
                // For fish, we might want to keep it in manual mode after drag
                // or have an option to resume automation. For now, it stays where it is.
            }


            applyTransform() {
                // Combined scale and direction flip
                const flip = this.direction === 1 ? 1 : -1;
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                this.element.style.transform = `scale(${this.scale * flip}, ${this.scale})`; // Apply flip to X, scale to both
            }


            move() {
                if (!this.isAutomated) return; // Don't move if not automated

                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                this.x += this.speed * this.direction;
                this.y += Math.sin(this.phase) * this.amplitude * 0.1;
                this.phase += this.frequency;

                // Reverse direction if hitting horizontal boundaries
                if (this.direction === 1 && this.x > viewportWidth) {
                    this.x = -this.size; // Teleport to other side
                    this.y = getRandom(viewportHeight * 0.1, viewportHeight * 0.7); // New vertical path
                    this.direction = -1; // Change direction
                } else if (this.direction === -1 && this.x < -this.size) {
                    this.x = viewportWidth; // Teleport to other side
                    this.y = getRandom(viewportHeight * 0.1, viewportHeight * 0.7); // New vertical path
                    this.direction = 1; // Change direction
                }

                // Prevent going too high/low
                if (this.y < viewportHeight * 0.05 || this.y > viewportHeight * 0.75 - this.size) {
                    this.phase = -this.phase; // Reverse vertical movement
                    this.y = Math.max(viewportHeight * 0.05, Math.min(this.y, viewportHeight * 0.75 - this.size));
                }

                this.applyTransform();
            }

            remove() {
                super.remove();
                fishArray = fishArray.filter(f => f !== this);
                fishCount--;
            }
        }

        function addFish() {
            if (fishCount < maxFish) {
                const fish = new Fish();
                fishArray.push(fish);
                fishCount++;
            }
        }

        function removeFish() {
            if (fishArray.length > 0) {
                const fishToRemove = fishArray.pop(); // Remove the last added fish
                fishToRemove.remove();
            }
        }

        // --- Bubbles System ---
        class Bubble {
            constructor() {
                this.element = document.createElement('div');
                this.element.classList.add('bubble');
                aquariumContainer.appendChild(this.element);

                this.initBubble();
            }

            initBubble() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                this.size = getRandom(5, 20);
                this.speed = getRandom(0.5, 2);
                this.x = getRandom(0, viewportWidth - this.size);
                this.y = viewportHeight + getRandom(0, 100);
                this.opacity = getRandom(0.3, 0.7);

                this.element.style.width = `${this.size}px`;
                this.element.style.height = `${this.size}px`;
                this.element.style.opacity = this.opacity;
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                this.element.style.filter = `blur(${this.size * 0.05}px)`;
            }

            move() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                this.y -= this.speed;
                this.element.style.left = `${this.x + Math.sin(this.y * 0.05) * 5}px`;
                this.element.style.top = `${this.y}px`;

                if (this.y < -this.size) {
                    this.initBubble();
                }
            }

            remove() {
                this.element.remove();
            }
        }

        function generateBubbles(count) {
            for (let i = 0; i < count; i++) {
                bubblesArray.push(new Bubble());
            }
        }

        function toggleBubbles() {
            bubblesEnabled = !bubblesEnabled;
            if (bubblesEnabled) {
                if (bubblesArray.length === 0) {
                     generateBubbles(20);
                }
                toggleBubblesBtn.textContent = "Disable Bubbles";
            } else {
                bubblesArray.forEach(bubble => bubble.remove());
                bubblesArray = [];
                toggleBubblesBtn.textContent = "Enable Bubbles";
            }
        }

        // --- Animation Loop ---
        let lastTimestamp = 0;

        function animate(timestamp) {
            const deltaTime = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            // Ornaments apply their drift in their own applyTransform
            ornamentsArray.forEach(ornament => {
                 if (!ornament.isDragging) { // Only drift if not dragging
                    ornament.applyTransform();
                 }
            });


            fishArray.forEach(fish => fish.move()); // Fish move() function now checks isAutomated

            if (bubblesEnabled) {
                bubblesArray.forEach(bubble => bubble.move());
            }

            requestAnimationFrame(animate);
        }

        // --- Global Deselect Listener ---
        aquariumContainer.addEventListener('click', (e) => {
            if (selectedItem && !e.target.closest('.draggable-item')) {
                selectedItem.deselect();
            }
        });

        // --- Event Listeners ---
        playMusicBtn.addEventListener('click', () => {
            backgroundMusic.play().catch(e => console.log("Music play prevented:", e));
        });
        addFishBtn.addEventListener('click', addFish);
        removeFishBtn.addEventListener('click', removeFish);
        toggleBubblesBtn.addEventListener('click', toggleBubbles);

        // --- Initialization ---
        window.onload = () => {
            generateShopItems();

            for (let i = 0; i < 5; i++) {
                addFish();
            }
            generateBubbles(20);
            requestAnimationFrame(animate);
        };

        const debouncedResize = debounce(() => {
            fishArray.forEach(fish => fish.initPositionAndSize()); // Re-initialize fish for new size
            if (bubblesEnabled) {
                bubblesArray.forEach(bubble => bubble.initBubble());
            }
            // Ornaments need to re-clamp their positions based on new viewport size
            ornamentsArray.forEach(ornament => {
                const scaledWidth = ornament.element.clientWidth * ornament.scale;
                const scaledHeight = ornament.element.clientHeight * ornament.scale;
                ornament.x = Math.max(0, Math.min(ornament.x, window.innerWidth - scaledWidth));
                ornament.y = Math.max(0, Math.min(ornament.y, window.innerHeight - scaledHeight));
                ornament.applyTransform(); // Re-apply transform to update position
            });
        }, 200);

        window.addEventListener('resize', debouncedResize);

    </script>
</body>
</html>
