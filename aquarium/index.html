<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Aquarium</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: rgba(0, 0, 0, 0.1);
            --selected-glow: 0 0 10px 5px rgba(0, 255, 255, 0.7), 0 0 20px 10px rgba(0, 200, 200, 0.5);
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000; /* Fallback for background */
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: default; /* Default cursor */
            user-select: none; /* Prevent text selection during drag */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .aquarium-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background/background1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2; /* Below overlay and content */
        }

        .aquarium-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, rgba(0, 70, 150, 0.2) 0%, rgba(0, 0, 0, 0) 70%),
                        linear-gradient(to top, rgba(0, 100, 200, 0.1) 0%, rgba(0, 10, 30, 0.2) 100%);
            z-index: -1; /* Above background, below content */
            pointer-events: none; /* Allows clicks to pass through to elements below */
        }

        #aquarium-container {
            position: absolute;
            width: 100%;
            height: 100%;
            touch-action: none; /* Prevent browser touch actions like pull-to-refresh */
        }

        .ornament-wrapper {
            position: absolute;
            transform-origin: bottom center; /* Scale from bottom for ornaments */
            will-change: transform, left, top;
            touch-action: none; /* Crucial for drag and drop on touch devices */
            z-index: 1; /* Default for ornaments */
            cursor: grab; /* Indicate draggable */
            transition: box-shadow 0.2s ease-out; /* Smooth glow */
        }

        .ornament-wrapper.dragging {
            cursor: grabbing;
            z-index: 100; /* Bring to front when dragging */
        }

        .ornament-wrapper.selected {
            box-shadow: var(--selected-glow);
            z-index: 50; /* Bring to front when selected */
        }

        .ornament-image {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none; /* Allow events to pass to wrapper for drag */
        }

        .ornament-controls {
            position: absolute;
            top: -30px; /* Position above the ornament */
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 5px 10px;
            display: flex;
            gap: 5px;
            box-shadow: 0 2px 5px var(--glass-shadow);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-out;
            z-index: 51; /* Above the ornament */
            white-space: nowrap; /* Prevent buttons from wrapping */
        }

        .ornament-wrapper.selected .ornament-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .ornament-controls button, .ornament-controls input[type="range"] {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #333;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            transition: all 0.1s ease;
        }
        .ornament-controls button {
            padding: 5px 8px;
        }

        .ornament-controls button:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .ornament-controls input[type="range"] {
            width: 80px;
            -webkit-appearance: none;
            height: 8px;
            margin: 0 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            border-radius: 4px;
        }

        .ornament-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00aaff;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        .ornament-controls input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00aaff;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        .fish {
            position: absolute;
            z-index: 2;
            image-rendering: optimizeSpeed; /* Optimize image quality for movement */
            transform-origin: center center;
            will-change: transform, left, top; /* Optimize for animation */
            cursor: pointer; /* Indicate interactivity */
        }

        .fish img {
            display: block;
            width: 100%;
            height: auto;
        }

        .bubble {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0; /* Below fish and ornaments */
            filter: blur(0.5px);
            will-change: transform, opacity;
        }

        /* UI Controls - Glassmorphism Style */
        .controls-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* For Safari */
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 10px var(--glass-shadow);
            z-index: 10;
            user-select: none; /* Prevent text selection */
        }

        .controls-panel button {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #333;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px); /* Ensure button background is also blurred */
        }

        .controls-panel button:hover {
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transform: translateY(-1px);
        }

        .controls-panel button:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* Ornament Shop Panel */
        .shop-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 10px var(--glass-shadow);
            z-index: 10;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shop-panel h3 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 1.1em;
            text-align: center;
        }

        .shop-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .shop-item {
            width: 60px; /* Thumbnail size */
            height: 60px;
            border: 2px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .shop-item:hover {
            border-color: #00aaff;
            box-shadow: 0 0 5px rgba(0, 170, 255, 0.5);
        }

        .shop-item img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            display: block;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .controls-panel {
                top: 10px;
                right: 10px;
                padding: 10px;
                gap: 5px;
            }
            .controls-panel button {
                padding: 8px 12px;
                font-size: 0.8em;
            }

            .shop-panel {
                top: 10px;
                left: 10px;
                padding: 10px;
                gap: 8px;
            }
            .shop-panel h3 {
                font-size: 1em;
                margin-bottom: 5px;
            }
            .shop-items {
                gap: 5px;
            }
            .shop-item {
                width: 50px;
                height: 50px;
            }

            /* Adjust ornament controls for smaller screens */
            .ornament-controls {
                transform: translateX(-50%) scale(0.8);
                top: -25px;
            }
        }
    </style>
</head>
<body>

    <div class="aquarium-background"></div>
    <div class="aquarium-overlay"></div>

    <div id="aquarium-container">
        <!-- Ornaments will be injected here by JS -->
        <!-- Fish will be injected here by JS -->
        <!-- Bubbles will be injected here by JS -->
    </div>

    <div class="controls-panel">
        <button id="addFishBtn">Add Fish</button>
        <button id="removeFishBtn">Remove Fish</button>
        <button id="toggleBubblesBtn">Toggle Bubbles</button>
    </div>

    <div class="shop-panel">
        <h3>Ornament Shop</h3>
        <div class="shop-items" id="shopItems">
            <!-- Shop items will be generated here by JS -->
        </div>
    </div>

    <!-- Looped background music -->
    <audio id="backgroundMusic" src="838fc208-2aa9-407e-ae4a-f7178acb7e65.mp3" autoplay loop></audio>

    <script>
        const aquariumContainer = document.getElementById('aquarium-container');
        const addFishBtn = document.getElementById('addFishBtn');
        const removeFishBtn = document.getElementById('removeFishBtn');
        const toggleBubblesBtn = document.getElementById('toggleBubblesBtn');
        const shopItemsDiv = document.getElementById('shopItems');
        const backgroundMusic = document.getElementById('backgroundMusic');

        // Paths are relative to the HTML file (index.html), which is inside yoga/aquarium/
        const ornamentImageSources = [ // Renamed to clearly indicate they are sources
            'ornamen/ornamen1.png',
            'ornamen/ornamen2.png',
            'ornamen/ornamen3.png',
            'ornamen/ornamen4.png'
        ];
        const fishImage = 'fish/fish1.png';

        const maxFish = 10;
        const maxOrnaments = 20; // Limit total ornaments for performance

        let fishCount = 0;
        let fishArray = [];
        let ornamentsArray = [];
        let bubblesArray = [];
        let bubblesEnabled = true;

        let selectedOrnament = null; // Track currently selected ornament

        // --- Utility Functions ---
        function getRandom(min, max) {
            return Math.random() * (max - min) + min;
        }
        function debounce(func, delay) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), delay);
            };
        }

        // --- Ornament Class (Enhanced) ---
        class Ornament {
            constructor(src) {
                this.src = src;
                this.element = document.createElement('div');
                this.element.classList.add('ornament-wrapper');
                aquariumContainer.appendChild(this.element);

                this.img = document.createElement('img');
                this.img.src = src;
                this.img.classList.add('ornament-image');
                this.element.appendChild(this.img);

                this.controls = this.createControls();
                this.element.appendChild(this.controls);

                this.x = 0; // Current x position
                this.y = 0; // Current y position
                this.scale = 1; // Current scale factor
                this.isDragging = false;
                this.offsetX = 0;
                this.offsetY = 0;

                this.addEventListeners();
                this.deselect(); // Start deselected

                this.initPositionAndSize();
            }

            createControls() {
                const controlsDiv = document.createElement('div');
                controlsDiv.classList.add('ornament-controls');

                // Delete Button
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '❌';
                deleteBtn.title = 'Delete Ornament';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); // Prevent re-selecting the ornament
                    this.remove();
                });
                controlsDiv.appendChild(deleteBtn);

                // Resize Slider
                const resizeSlider = document.createElement('input');
                resizeSlider.type = 'range';
                resizeSlider.min = '0.5';
                resizeSlider.max = '2.0';
                resizeSlider.step = '0.05';
                resizeSlider.value = this.scale.toString();
                resizeSlider.title = 'Resize';
                resizeSlider.addEventListener('input', (e) => {
                    this.scale = parseFloat(e.target.value);
                    this.applyTransform();
                });
                // Prevent drag from interfering with slider
                resizeSlider.addEventListener('mousedown', (e) => e.stopPropagation());
                resizeSlider.addEventListener('touchstart', (e) => e.stopPropagation());
                controlsDiv.appendChild(resizeSlider);

                return controlsDiv;
            }

            addEventListeners() {
                this.element.addEventListener('mousedown', this.onStartDrag.bind(this));
                this.element.addEventListener('touchstart', this.onStartDrag.bind(this), { passive: false });
            }

            initPositionAndSize(initialX = null, initialY = null) {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                const baseWidth = getRandom(viewportWidth * 0.12, viewportWidth * 0.28);
                this.element.style.width = `${baseWidth}px`;
                this.element.style.height = 'auto'; // Maintain aspect ratio

                // Use onload to ensure clientHeight is available for initial positioning
                this.img.onload = () => {
                    const ornamentHeight = this.img.clientHeight; // Use image height for positioning
                    const ornamentWidth = this.img.clientWidth;

                    this.scale = 1; // Reset scale
                    this.controls.querySelector('input[type="range"]').value = this.scale.toString();


                    if (initialX !== null && initialY !== null) {
                        this.x = initialX - ornamentWidth / 2;
                        this.y = initialY - ornamentHeight / 2;
                    } else {
                        // Default to bottom-center for new ornaments
                        this.x = (viewportWidth / 2) - (ornamentWidth / 2);
                        this.y = viewportHeight - ornamentHeight - (viewportHeight * 0.05); // A bit above bottom
                    }
                    this.applyTransform();
                };

                // If image is already loaded, execute onload directly
                if (this.img.complete) {
                     this.img.onload();
                }
            }

            applyTransform() {
                // We're using absolute positioning (left/top) for initial placement and direct pixel manipulation,
                // and `transform: scale()` for resizing.
                // The draggable position should update `this.x` and `this.y`, then `left` and `top`.
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                this.element.style.transform = `scale(${this.scale})`;
            }

            select() {
                if (selectedOrnament && selectedOrnament !== this) {
                    selectedOrnament.deselect();
                }
                this.element.classList.add('selected');
                this.element.style.zIndex = 50; // Bring selected to front
                selectedOrnament = this;
            }

            deselect() {
                this.element.classList.remove('selected');
                this.element.style.zIndex = 1; // Reset z-index
                if (selectedOrnament === this) {
                    selectedOrnament = null;
                }
            }

            onStartDrag(e) {
                e.preventDefault(); // Prevent default browser actions (e.g., image drag, scrolling)
                this.select(); // Select this ornament when interaction starts

                this.isDragging = true;
                this.element.classList.add('dragging');
                this.element.style.zIndex = 100; // Bring to absolute front when dragging

                let clientX, clientY;
                if (e.type === 'touchstart') {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                // Calculate offset from mouse/touch to element's top-left corner
                const rect = this.element.getBoundingClientRect();
                this.offsetX = clientX - rect.left;
                this.offsetY = clientY - rect.top;

                // Add global listeners for dragging
                document.addEventListener('mousemove', this.onDrag.bind(this));
                document.addEventListener('mouseup', this.onStopDrag.bind(this));
                document.addEventListener('touchmove', this.onDrag.bind(this), { passive: false });
                document.addEventListener('touchend', this.onStopDrag.bind(this));
            }

            onDrag(e) {
                if (!this.isDragging) return;

                let clientX, clientY;
                if (e.type === 'touchmove') {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                this.x = clientX - this.offsetX;
                this.y = clientY - this.offsetY;

                // Clamp to boundaries
                this.x = Math.max(0, Math.min(this.x, window.innerWidth - this.element.clientWidth * this.scale));
                this.y = Math.max(0, Math.min(this.y, window.innerHeight - this.element.clientHeight * this.scale));

                this.applyTransform(); // Update position
            }

            onStopDrag(e) {
                this.isDragging = false;
                this.element.classList.remove('dragging');
                // Don't deselect here, keep it selected for controls
                document.removeEventListener('mousemove', this.onDrag.bind(this));
                document.removeEventListener('mouseup', this.onStopDrag.bind(this));
                document.removeEventListener('touchmove', this.onDrag.bind(this));
                document.removeEventListener('touchend', this.onStopDrag.bind(this));
            }

            remove() {
                this.element.remove();
                ornamentsArray = ornamentsArray.filter(orn => orn !== this);
                if (selectedOrnament === this) {
                    selectedOrnament = null;
                }
            }
        }


        // --- Ornament Shop ---
        function generateShopItems() {
            shopItemsDiv.innerHTML = ''; // Clear previous items
            ornamentImageSources.forEach(src => {
                const shopItem = document.createElement('div');
                shopItem.classList.add('shop-item');
                shopItem.title = src.split('/').pop().split('.')[0].replace(/(\d)/, ' $1'); // e.g., "ornamen 1"

                const img = document.createElement('img');
                img.src = src;
                shopItem.appendChild(img);

                shopItem.addEventListener('click', () => {
                    if (ornamentsArray.length < maxOrnaments) {
                        const newOrnament = new Ornament(src);
                        ornamentsArray.push(newOrnament);
                        newOrnament.select(); // Select new ornament automatically
                    } else {
                        alert(`Maximum ${maxOrnaments} ornaments reached for performance!`);
                    }
                });
                shopItemsDiv.appendChild(shopItem);
            });
        }


        // --- Fish System ---
        class Fish {
            constructor() {
                this.element = document.createElement('div');
                this.element.classList.add('fish');
                this.img = document.createElement('img');
                this.img.src = fishImage;
                this.element.appendChild(this.img);
                aquariumContainer.appendChild(this.element);
                this.element.addEventListener('click', this.remove.bind(this)); // Add click listener

                this.initPositionAndSize();
            }

            initPositionAndSize() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                this.size = getRandom(viewportWidth * 0.04, viewportWidth * 0.1); // Fish size relative to viewport
                this.speed = getRandom(0.5, 2); // Pixels per frame
                this.amplitude = getRandom(viewportHeight * 0.01, viewportHeight * 0.03); // Vertical sine wave amplitude
                this.frequency = getRandom(0.02, 0.05); // Vertical sine wave frequency
                this.phase = getRandom(0, Math.PI * 2); // Starting phase for sine wave

                this.element.style.width = `${this.size}px`;

                this.direction = Math.random() < 0.5 ? 1 : -1; // 1 for right, -1 for left
                // Start off-screen
                this.x = this.direction === 1 ? -this.size : viewportWidth;
                this.y = getRandom(viewportHeight * 0.1, viewportHeight * 0.7); // Y position (avoiding bottom for ornaments)

                this.updateTransform();
            }

            updateTransform() {
                // Apply horizontal flip based on direction
                this.img.style.transform = `scaleX(${this.direction})`;
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
            }

            move() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                // Horizontal movement
                this.x += this.speed * this.direction;

                // Vertical sine wave movement
                this.y += Math.sin(this.phase) * this.amplitude * 0.1; // Slower vertical drift
                this.phase += this.frequency;

                // Check for screen exit and re-entry
                if (this.direction === 1 && this.x > viewportWidth) {
                    this.x = -this.size; // Re-enter from left
                    this.y = getRandom(viewportHeight * 0.1, viewportHeight * 0.7); // New random Y
                    this.direction *= -1; // Flip direction for a more natural re-entry
                    this.img.style.transform = `scaleX(${this.direction})`; // Apply flip immediately
                } else if (this.direction === -1 && this.x < -this.size) {
                    this.x = viewportWidth; // Re-enter from right
                    this.y = getRandom(viewportHeight * 0.1, viewportHeight * 0.7); // New random Y
                    this.direction *= -1; // Flip direction for a more natural re-entry
                    this.img.style.transform = `scaleX(${this.direction})`; // Apply flip immediately
                }

                // If fish is too high or low, reverse vertical direction or clamp
                if (this.y < viewportHeight * 0.05 || this.y > viewportHeight * 0.75 - this.size) { // Keep above ornaments
                    this.phase = -this.phase; // Reverse vertical movement
                    this.y = Math.max(viewportHeight * 0.05, Math.min(this.y, viewportHeight * 0.75 - this.size)); // Clamp to bounds
                }

                this.updateTransform();
            }

            remove() {
                this.element.remove();
                fishArray = fishArray.filter(f => f !== this);
                fishCount--;
            }
        }

        function addFish() {
            if (fishCount < maxFish) {
                const fish = new Fish();
                fishArray.push(fish);
                fishCount++;
            }
        }

        function removeFish() {
            if (fishArray.length > 0) {
                const fishToRemove = fishArray.pop();
                fishToRemove.remove(); // Use the class's remove method
            }
        }

        // --- Bubbles System ---
        class Bubble {
            constructor() {
                this.element = document.createElement('div');
                this.element.classList.add('bubble');
                aquariumContainer.appendChild(this.element);

                this.initBubble();
            }

            initBubble() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                this.size = getRandom(5, 20); // Static size for bubbles, they are small
                this.speed = getRandom(0.5, 2);
                this.x = getRandom(0, viewportWidth - this.size);
                this.y = viewportHeight + getRandom(0, 100); // Start slightly below screen
                this.opacity = getRandom(0.3, 0.7);

                this.element.style.width = `${this.size}px`;
                this.element.style.height = `${this.size}px`;
                this.element.style.opacity = this.opacity;
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                this.element.style.filter = `blur(${this.size * 0.05}px)`; // Dynamic blur
            }

            move() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                this.y -= this.speed;
                // Slight horizontal drift using sine wave
                this.element.style.left = `${this.x + Math.sin(this.y * 0.05) * 5}px`;
                this.element.style.top = `${this.y}px`;


                // Re-enter from bottom when exiting top
                if (this.y < -this.size) {
                    this.initBubble(); // Re-initialize all properties for a new bubble cycle
                }
            }

            remove() {
                this.element.remove();
            }
        }

        function generateBubbles(count) {
            for (let i = 0; i < count; i++) {
                bubblesArray.push(new Bubble());
            }
        }

        function toggleBubbles() {
            bubblesEnabled = !bubblesEnabled;
            if (bubblesEnabled) {
                if (bubblesArray.length === 0) {
                     generateBubbles(20);
                }
                toggleBubblesBtn.textContent = "Disable Bubbles";
            } else {
                bubblesArray.forEach(bubble => bubble.remove());
                bubblesArray = [];
                toggleBubblesBtn.textContent = "Enable Bubbles";
            }
        }

        // --- Animation Loop ---
        let lastTimestamp = 0;

        function animate(timestamp) {
            const deltaTime = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            // Ornaments (only subtle drift, drag/resize is handled by event listeners)
            ornamentsArray.forEach(ornament => {
                 if (!ornament.isDragging) { // Only apply drift if not being dragged
                    const drift = Math.sin(timestamp * 0.0001) * 5;
                    // Apply drift by adjusting X coordinate slightly, then re-applying transform
                    // Note: This approach directly modifies x, then applies transform.
                    // If using CSS transform for movement, this would be `element.style.transform += translateX(...)`.
                    // For simplicity with drag, we're keeping `x` and `y` for absolute positioning.
                    // This drift is more complex when combined with absolute positioning and transforms for drag.
                    // Let's simplify: only apply a subtle visual wiggle via CSS transform for non-dragging.
                    // The core position (x,y) should remain absolute for drag.
                    ornament.element.style.transform = `scale(${ornament.scale}) translateX(${drift}px)`;
                 }
            });

            // Animate fish
            fishArray.forEach(fish => fish.move());

            // Animate bubbles
            if (bubblesEnabled) {
                bubblesArray.forEach(bubble => bubble.move());
            }

            requestAnimationFrame(animate);
        }

        // --- Global Deselect Listener ---
        // Click anywhere on aquarium to deselect ornament
        aquariumContainer.addEventListener('click', (e) => {
            if (selectedOrnament && !e.target.closest('.ornament-wrapper')) {
                selectedOrnament.deselect();
            }
        });

        // --- Event Listeners ---
        addFishBtn.addEventListener('click', addFish);
        removeFishBtn.addEventListener('click', removeFish);
        toggleBubblesBtn.addEventListener('click', toggleBubbles);

        // --- Initialization ---
        window.onload = () => {
            backgroundMusic.play().catch(e => console.log("Autoplay prevented:", e));

            generateShopItems(); // Populate the shop

            // Initial ornaments (optional, can start with none)
            // for(let i = 0; i < 3; i++) {
            //     if (ornamentImageSources[i]) {
            //         const newOrnament = new Ornament(ornamentImageSources[i]);
            //         ornamentsArray.push(newOrnament);
            //     }
            // }


            for (let i = 0; i < 5; i++) { // Start with 5 fish
                addFish();
            }
            generateBubbles(20); // Initial bubbles
            requestAnimationFrame(animate); // Start animation loop
        };

        // Resize event to handle fish and bubble repositioning
        const debouncedResize = debounce(() => {
            // Re-initialize fish and bubbles to adapt their sizes/positions to new viewport
            fishArray.forEach(fish => fish.initPositionAndSize());
            if (bubblesEnabled) {
                bubblesArray.forEach(bubble => bubble.initBubble());
            }
            // Ornaments will retain their relative positions but might need scale adjustment
            ornamentsArray.forEach(ornament => ornament.initPositionAndSize(ornament.x + ornament.element.clientWidth/2, ornament.y + ornament.element.clientHeight/2)); // Recalculate based on current center
        }, 200);

        window.addEventListener('resize', debouncedResize);

    </script>
</body>
