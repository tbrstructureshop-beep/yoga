                this.element.style.transform = `translate(${this.x}px, ${this.y}px)`;
                this.element.style.filter = `blur(${this.size * 0.05}px)`;
            }

            update(deltaTime) {
                this.y -= this.speed * (deltaTime / 16.66); // Move up
                this.x += Math.sin(this.y * 0.005) * 5 * (deltaTime / 16.66); // Subtle side-to-side drift

                this.element.style.transform = `translate(${this.x}px, ${this.y}px)`;

                if (this.y < -this.size) { // Reset if off-screen top
                    this.init();
                }
            }

            remove() {
                this.element.remove();
            }
        }

        // --- Module: InputHandler ---
        // Manages save/load and general persistence.
        const InputHandler = (() => {

            function saveAquariumState() {
                const state = {
                    version: GAME_SETTINGS.PERSISTENCE_VERSION,
                    items: EntityManager.getAllItems().map(item => ({
                        id: item.id, // Persist individual item ID for potential future tracking
                        assetId: item.asset.id,
                        type: item instanceof Fish ? 'fish' : 'ornament',
                        x: item.x,
                        y: item.y,
                        scale: item.scale,
                        // Fish-specific properties
                        direction: item instanceof Fish ? item.direction : undefined,
                        isAutomated: item instanceof Fish ? item.isAutomated : undefined,
                        baseY: item instanceof Fish ? item.baseY : undefined, // For consistent sine wave
                        phase: item instanceof Fish ? item.phase : undefined,
                        speed: item instanceof Fish ? item.speed : undefined,
                        idleTimer: item instanceof Fish ? item.idleTimer : undefined,
                        isIdling: item instanceof Fish ? item.isIdling : undefined,
                    })),
                    musicPlaying: currentGameState.isMusicPlaying,
                    bubblesEnabled: currentGameState.bubblesEnabled
                };
                try {
                    localStorage.setItem('aquariumState', JSON.stringify(state));
                    UIController.showToast('Aquarium state saved!', 'success');
                } catch (e) {
                    console.error('Failed to save state:', e);
                    UIController.showToast('Failed to save state!', 'error');
                }
            }

            function loadAquariumState() {
                try {
                    const savedState = localStorage.getItem('aquariumState');
                    if (savedState) {
                        const state = JSON.parse(savedState);

                        // Handle versioning for future compatibility
                        if (state.version !== GAME_SETTINGS.PERSISTENCE_VERSION) {
                            UIController.showToast('Old save data detected. Attempting migration.', 'info');
                            // Implement migration logic here for future versions
                        }

                        EntityManager.clearAllItems(); // Clear current aquarium

                        state.items.forEach(itemData => {
                            const assetConfig = AssetManager.getAssetConfig(itemData.assetId);
                            if (assetConfig) {
                                let newItem;
                                if (itemData.type === 'fish') {
                                    newItem = new Fish(assetConfig);
                                    newItem.direction = itemData.direction;
                                    newItem.isAutomated = itemData.isAutomated;
                                    newItem.baseY = itemData.baseY;
                                    newItem.phase = itemData.phase;
                                    newItem.speed = itemData.speed;
                                    newItem.idleTimer = itemData.idleTimer;
                                    newItem.isIdling = itemData.isIdling;
                                } else {
                                    newItem = new Ornament(assetConfig);
                                }
                                newItem.x = itemData.x;
                                newItem.y = itemData.y;
                                newItem.scale = itemData.scale;
                                newItem.applyTransform(); // Apply saved transform immediately
                                EntityManager.createItem(assetConfig, itemData.type); // Create via EntityManager to re-add to items array
                                EntityManager.getAllItems().pop().element.remove(); // Remove temporary one, then re-add
                                EntityManager.getAllItems()[EntityManager.getAllItems().length - 1] = newItem; // Replace with fully loaded item
                            }
                        });

                        // Restore global settings
                        UIController.setMusicState(state.musicPlaying);
                        UIController.setBubblesState(state.bubblesEnabled);

                        UIController.showToast('Aquarium state loaded!', 'success');
                    } else {
                        UIController.showToast('No saved state found!', 'info');
                    }
                } catch (e) {
                    console.error('Failed to load state:', e);
                    UIController.showToast('Failed to load state!', 'error');
                }
            }

            return {
                saveAquariumState,
                loadAquariumState
            };
        })();


        // --- Module: AnimationEngine ---
        // Manages the main game loop.
        const AnimationEngine = (() => {
            let lastTimestamp = 0;

            function init() {
                DOM.aquariumBackground.style.backgroundImage = `url(${ASSET_CONFIG.background})`;
                currentGameState.animationFrameId = requestAnimationFrame(animate);
            }

            function animate(timestamp) {
                const deltaTime = timestamp - lastTimestamp;
                lastTimestamp = timestamp;

                EntityManager.update(deltaTime);

                currentGameState.animationFrameId = requestAnimationFrame(animate);
            }

            return { init };
        })();


        // --- Main Application Initialization ---
        document.addEventListener('DOMContentLoaded', async () => {
            await AssetManager.loadAllAssets(); // Preload all assets

            UIController.init();
            AnimationEngine.init(); // Start game loop

            // Initial fish population (add a few default fish if no save state)
            if (!localStorage.getItem('aquariumState')) {
                for (let i = 0; i < 3; i++) { // Start with 3 fish
                    const defaultFishAsset = ASSET_CONFIG.fish[0];
                    if (defaultFishAsset) {
                        EntityManager.createItem(defaultFishAsset, 'fish');
                    }
                }
            } else {
                InputHandler.loadAquariumState(); // Attempt to load saved state
            }
        });
    </script>
