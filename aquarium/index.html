<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium Virtual Aquarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-blue: #00eaff;
            --neon-purple: #ae00ff;
            --neon-green: #00ff66;
            --text-color: #e0e0e0;
            --panel-width-desktop: 300px;
            --panel-width-mobile: 90%;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-color);
            background-color: #1a1a2e; /* Dark background behind the aquarium */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            touch-action: none; /* Prevent browser gestures */
        }

        #aquarium-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1920px; /* Example max width */
            max-height: 1080px; /* Example max height */
            overflow: hidden;
            background-color: #001f3f; /* Deep blue water color */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #background {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.7) blur(1px); /* Subtly dim and blur the background */
            z-index: 0;
        }

        #entity-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10; /* Above background, below UI */
            pointer-events: none; /* Entities will handle their own pointer events */
        }

        .aquarium-entity {
            position: absolute;
            cursor: grab;
            touch-action: none;
            will-change: transform, opacity, filter;
            transition: transform 0.1s ease-out, opacity 0.3s ease-out; /* For smooth dragging and spawn */
            pointer-events: auto; /* Allow interaction */
        }

        .aquarium-entity.dragging {
            cursor: grabbing;
            filter: drop-shadow(0 0 10px var(--neon-blue));
            z-index: 1000 !important; /* Bring dragged item to front */
        }

        .aquarium-entity.fish {
            transition: transform 0.1s linear, opacity 0.3s ease-out, filter 0.2s ease-out; /* Fish specific transition */
        }

        .aquarium-entity.spawn-animation {
            opacity: 0;
            transform: scale(0.5);
        }

        .aquarium-entity.spawned {
            opacity: 1;
            transform: scale(1);
        }

        /* Water distortion effect (subtle overlay) */
        #water-surface-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100; /* Above entities, below UI */
            background: radial-gradient(circle at 50% 0%, rgba(0, 50, 100, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            animation: waterFlow 15s linear infinite;
        }

        @keyframes waterFlow {
            0% { background-position: 0 0; }
            100% { background-position: 100% 100%; }
        }

        /* UI Panels */
        .panel {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 200;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }

        #shop-panel {
            right: -100%; /* Off-screen by default */
            top: 50%;
            transform: translateY(-50%) translateX(0);
            width: var(--panel-width-desktop);
            height: 80vh;
            max-height: 700px;
            padding: 0; /* Content will have padding */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #shop-panel.open {
            right: 20px;
            transform: translateY(-50%) translateX(0);
        }

        #controls-panel {
            left: 20px;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Shop specific styles */
        .shop-tabs {
            display: flex;
            width: 100%;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 5px;
        }

        .shop-tab-button {
            flex: 1;
            padding: 15px 10px;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1em;
            transition: background-color 0.2s ease, color 0.2s ease, text-shadow 0.2s ease;
            text-align: center;
        }

        .shop-tab-button:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .shop-tab-button.active {
            background-color: var(--glass-bg);
            border-bottom: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
        }

        .shop-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: none;
        }

        .shop-content.active {
            display: block;
        }

        .shop-item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
        }

        .shop-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative; /* For hover preview */
        }

        .shop-item:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 0 15px var(--neon-green);
            border-color: var(--neon-green);
        }

        .shop-item img {
            max-width: 80px;
            max-height: 80px;
            object-fit: contain;
            pointer-events: none; /* Prevent dragging the image itself */
        }

        .shop-item span {
            margin-top: 8px;
            font-size: 0.9em;
            text-align: center;
            color: var(--text-color);
        }

        /* Modal */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-out;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5); /* Neon glow for modal */
            text-align: center;
            min-width: 300px;
            transform: translateY(-20px) scale(0.9);
            opacity: 0;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .modal-content h3 {
            margin-top: 0;
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4em;
        }

        .modal-content input {
            width: 80px;
            padding: 10px;
            margin: 20px 0;
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.3);
            color: var(--neon-green);
            font-size: 1.2em;
            text-align: center;
            -moz-appearance: textfield; /* Hide arrows for Firefox */
        }
        .modal-content input::-webkit-outer-spin-button,
        .modal-content input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }


        .modal-actions {
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            touch-action: manipulation; /* For better mobile feedback */
        }

        .btn:hover {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 40px rgba(174, 0, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.3);
        }

        .btn.primary {
            background: linear-gradient(45deg, var(--neon-green), #00aaff);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }

        .btn.primary:hover {
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.8), 0 0 40px rgba(0, 170, 255, 0.4);
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-blue);
            box-shadow: none;
        }

        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.9em;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: 'Share Tech Mono', monospace;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px var(--neon-blue);
        }

        .control-btn.active {
            background: var(--neon-blue);
            color: white;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* Toast Notifications */
        #toast-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 400;
            pointer-events: none;
        }

        .toast {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px 20px;
            color: var(--text-color);
            font-size: 0.9em;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success { border-left: 5px solid var(--neon-green); }
        .toast.error { border-left: 5px solid var(--neon-purple); }
        .toast.info { border-left: 5px solid var(--neon-blue); }


        /* Bubble Particle System */
        #bubble-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 10; /* Same layer as entities */
        }

        .bubble {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            opacity: 0;
            animation: bubbleRise linear infinite;
        }

        @keyframes bubbleRise {
            0% {
                transform: translateY(0) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(-10%) translateX(var(--bubble-drift)) scale(var(--bubble-scale));
            }
            80% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) translateX(var(--bubble-drift)) scale(var(--bubble-scale));
                opacity: 0;
            }
        }

        /* Item controls (resize/delete) */
        .item-controls {
            position: absolute;
            bottom: -30px; /* Position below the entity */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .aquarium-entity.selected .item-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .control-icon {
            background-color: var(--neon-blue);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
            transition: transform 0.1s ease, background-color 0.1s ease, box-shadow 0.1s ease;
        }

        .control-icon:hover {
            transform: scale(1.1);
            background-color: var(--neon-green);
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.9);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #shop-panel {
                width: var(--panel-width-mobile);
                right: -100%;
                top: 50%; /* Center vertically */
                left: unset;
                transform: translateY(-50%) translateX(0);
                height: 90vh;
            }

            #shop-panel.open {
                right: 5%; /* A bit of margin */
                transform: translateY(-50%) translateX(0);
            }

            #controls-panel {
                left: 50%;
                transform: translateX(-50%);
                top: 10px;
                flex-direction: row; /* Buttons in a row */
                width: calc(100% - 20px);
                justify-content: center;
                gap: 5px;
                flex-wrap: wrap;
                padding: 10px;
            }

            .control-btn {
                padding: 8px 12px;
                font-size: 0.8em;
            }

            .shop-item-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 10px;
            }

            .shop-item img {
                max-width: 60px;
                max-height: 60px;
            }

            .modal-content {
                width: 90%;
                min-width: unset;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="aquarium-container">
        <div id="background"></div>
        <div id="entity-layer"></div>
        <div id="bubble-container"></div>
        <div id="water-surface-effect"></div>

        <div id="controls-panel" class="panel">
            <button id="shop-toggle-btn" class="control-btn"><span class="icon">🛍️</span> Shop</button>
            <button id="save-btn" class="control-btn"><span class="icon">💾</span> Save</button>
            <button id="load-btn" class="control-btn"><span class="icon">📂</span> Load</button>
            <button id="music-toggle-btn" class="control-btn active"><span class="icon">🎵</span> Music ON</button>
            <button id="reset-btn" class="control-btn secondary"><span class="icon">❌</span> Reset</button>
        </div>

        <div id="shop-panel" class="panel">
            <div class="shop-tabs">
                <button class="shop-tab-button active" data-tab="fish">Fish</button>
                <button class="shop-tab-button" data-tab="ornaments">Ornaments</button>
                <button id="shop-close-btn" class="control-btn" style="position: absolute; right: 10px; top: 10px; width: 30px; height: 30px; border-radius: 50%; padding: 0; font-size: 1.5em; line-height: 1; background: rgba(255,255,255,0.05);">✖</button>
            </div>
            <div id="fish-shop-content" class="shop-content active">
                <div class="shop-item-grid">
                    <!-- Fish items will be dynamically loaded here -->
                </div>
            </div>
            <div id="ornaments-shop-content" class="shop-content">
                <div class="shop-item-grid">
                    <!-- Ornament items will be dynamically loaded here -->
                </div>
            </div>
        </div>

        <div id="quantity-modal" class="modal-overlay">
            <div class="modal-content">
                <h3 id="modal-item-name">Add Item</h3>
                <input type="number" id="quantity-input" value="1" min="1" max="99">
                <div class="modal-actions">
                    <button id="confirm-quantity-btn" class="btn primary">Add</button>
                    <button id="cancel-quantity-btn" class="btn secondary">Cancel</button>
                </div>
            </div>
        </div>

        <div id="toast-container"></div>
    </div>

    <audio id="background-music" loop preload="auto">
        <source src="838fc208-2aa9-407e-ae4a-f7178acb7e65.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        // CORE CONFIGURATION
        const ASSET_CONFIG = {
            backgrounds: [
                { id: 'bg1', path: 'background/background1.png', name: 'Coral Reef' }
            ],
            fishes: [
                { id: 'fish1', path: 'fish/fish1.png', name: 'Clownfish', width: 80, height: 60, minScale: 0.8, maxScale: 1.2, speed: {min: 0.5, max: 2} },
                { id: 'fish2', path: 'fish/fish2.png', name: 'Blue Tang', width: 90, height: 70, minScale: 0.7, maxScale: 1.1, speed: {min: 0.7, max: 2.5} },
                { id: 'fish3', path: 'fish/fish3.png', name: 'Angelfish', width: 100, height: 80, minScale: 0.9, maxScale: 1.3, speed: {min: 0.4, max: 1.8} }
            ],
            ornaments: [
                { id: 'ornament1', path: 'ornamen/ornamen1.png', name: 'Coral Branch', width: 120, height: 100, isFixed: true, minScale: 1, maxScale: 1.5 },
                { id: 'ornament2', path: 'ornamen/ornamen2.png', name: 'Seaweed', width: 80, height: 150, isFixed: true, minScale: 0.8, maxScale: 1.2 },
                { id: 'ornament3', path: 'ornamen/ornamen3.png', name: 'Treasure Chest', width: 100, height: 80, isFixed: true, minScale: 0.9, maxScale: 1.1 }
            ]
        };

        // --- Module: AssetManager ---
        // Handles loading and providing asset data.
        const AssetManager = (() => {
            const assets = {};

            const loadAsset = (type, item) => {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        assets[item.id] = { ...item, img };
                        resolve(img);
                    };
                    img.onerror = () => {
                        console.error(`Failed to load ${type} asset: ${item.path}`);
                        reject(new Error(`Failed to load ${type} asset: ${item.path}`));
                    };
                    img.src = item.path;
                });
            };

            const loadAllAssets = async () => {
                const loadPromises = [];
                Object.values(ASSET_CONFIG.backgrounds).forEach(bg => loadPromises.push(loadAsset('background', bg)));
                Object.values(ASSET_CONFIG.fishes).forEach(fish => loadPromises.push(loadAsset('fish', fish)));
                Object.values(ASSET_CONFIG.ornaments).forEach(ornament => loadPromises.push(loadAsset('ornament', ornament)));
                return Promise.all(loadPromises);
            };

            const getAsset = (id) => assets[id];
            const getAssetsByType = (type) => ASSET_CONFIG[type].map(item => assets[item.id]);

            return {
                loadAllAssets,
                getAsset,
                getAssetsByType
            };
        })();

        // --- Module: EntityManager ---
        // Manages all active entities (fish, ornaments) in the aquarium.
        const EntityManager = (() => {
            let entities = [];
            let nextEntityId = 1;
            const entityLayer = document.getElementById('entity-layer');
            let selectedEntity = null;

            const createEntity = (assetId, x, y, scale = 1, zIndex = 10) => {
                const asset = AssetManager.getAsset(assetId);
                if (!asset) {
                    console.error(`Asset not found for ID: ${assetId}`);
                    return null;
                }

                const entityDiv = document.createElement('div');
                entityDiv.className = `aquarium-entity ${asset.isFixed ? 'ornament' : 'fish'} spawn-animation`;
                entityDiv.style.width = `${asset.width * scale}px`;
                entityDiv.style.height = `${asset.height * scale}px`;
                entityDiv.style.backgroundImage = `url(${asset.path})`;
                entityDiv.style.backgroundSize = 'contain';
                entityDiv.style.backgroundRepeat = 'no-repeat';
                entityDiv.style.backgroundPosition = 'center';
                entityDiv.style.left = `${x}px`;
                entityDiv.style.top = `${y}px`;
                entityDiv.style.zIndex = zIndex;
                entityDiv.dataset.id = nextEntityId++;
                entityDiv.dataset.assetId = assetId;
                entityDiv.dataset.scale = scale;
                entityDiv.dataset.zIndex = zIndex; // Store z-index for persistence

                // Add item controls
                const controlsDiv = document.createElement('div');
                controlsDiv.className = 'item-controls';
                controlsDiv.innerHTML = `
                    <div class="control-icon resize-handle" data-action="resize">+</div>
                    <div class="control-icon delete-btn" data-action="delete">🗑️</div>
                `;
                entityDiv.appendChild(controlsDiv);


                entityLayer.appendChild(entityDiv);

                // Add spawn animation
                setTimeout(() => {
                    entityDiv.classList.remove('spawn-animation');
                    entityDiv.classList.add('spawned');
                }, 50); // Small delay to allow CSS transition

                const entity = {
                    id: parseInt(entityDiv.dataset.id),
                    assetId: assetId,
                    element: entityDiv,
                    x: x,
                    y: y,
                    scale: scale,
                    zIndex: zIndex,
                    isFish: !asset.isFixed,
                    data: { ...asset } // Store asset data directly
                };

                if (entity.isFish) {
                    entity.direction = Math.random() < 0.5 ? 1 : -1; // 1 for right, -1 for left
                    entity.speed = asset.speed.min + Math.random() * (asset.speed.max - asset.speed.min);
                    entity.amplitude = Math.random() * 20 + 10; // Sine wave amplitude
                    entity.frequency = Math.random() * 0.05 + 0.02; // Sine wave frequency
                    entity.offsetY = y; // Base Y for sine wave
                    entity.idleTimer = 0;
                    entity.maxIdleTime = Math.random() * 500 + 200; // Frames to idle
                    entity.isIdling = false;
                    entity.tilt = 0; // For slight rotation
                }
                entities.push(entity);
                return entity;
            };

            const removeEntity = (id) => {
                const index = entities.findIndex(e => e.id === id);
                if (index !== -1) {
                    const entity = entities[index];
                    entity.element.classList.remove('spawned'); // Trigger fade-out
                    entity.element.classList.add('spawn-animation');
                    entity.element.style.transform = `scale(0.5) translate(${entity.x}px, ${entity.y}px)`; // Shrink out
                    entity.element.style.opacity = '0';
                    setTimeout(() => {
                        entity.element.remove();
                        entities.splice(index, 1);
                        if (selectedEntity && selectedEntity.id === id) {
                            setSelectedEntity(null);
                        }
                        UIController.showToast('Item deleted!', 'info');
                    }, 300); // Wait for fade-out transition
                }
            };

            const updateEntityPosition = (id, newX, newY, newScale = null) => {
                const entity = entities.find(e => e.id === id);
                if (entity) {
                    entity.x = newX;
                    entity.y = newY;
                    if (newScale !== null) {
                        entity.scale = newScale;
                        entity.element.style.width = `${entity.data.width * newScale}px`;
                        entity.element.style.height = `${entity.data.height * newScale}px`;
                        entity.element.dataset.scale = newScale;
                    }
                    applyEntityTransform(entity);
                }
            };

            const updateEntityZIndex = (id, newZIndex) => {
                const entity = entities.find(e => e.id === id);
                if (entity) {
                    entity.zIndex = newZIndex;
                    entity.element.style.zIndex = newZIndex;
                    entity.element.dataset.zIndex = newZIndex;
                }
            }


            const setSelectedEntity = (entity) => {
                if (selectedEntity) {
                    selectedEntity.element.classList.remove('selected');
                }
                selectedEntity = entity;
                if (selectedEntity) {
                    selectedEntity.element.classList.add('selected');
                }
            };

            const getSelectedEntity = () => selectedEntity;
            const getAllEntities = () => entities;
            const clearEntities = () => {
                entities.forEach(entity => entity.element.remove());
                entities = [];
                nextEntityId = 1;
                setSelectedEntity(null);
            };

            const applyEntityTransform = (entity) => {
                const elem = entity.element;
                let transform = `translate(${entity.x}px, ${entity.y}px)`;

                if (entity.isFish) {
                    // Apply flip and tilt for fish
                    const flipScaleX = entity.direction === -1 ? -1 : 1;
                    transform += ` scaleX(${flipScaleX}) rotateZ(${entity.tilt}deg)`;

                    // Depth illusion: scale & blur based on Y position (deeper = smaller/blurrier)
                    const normalizedY = entity.y / entityLayer.clientHeight; // 0 to 1
                    const minDepthScale = entity.data.minScale || 0.7;
                    const maxDepthScale = entity.data.maxScale || 1.1;
                    const depthScale = minDepthScale + (maxDepthScale - minDepthScale) * (1 - normalizedY);
                    elem.style.transform = `${transform} scale(${depthScale})`;

                    const maxBlur = 3; // Max blur in pixels
                    const blurAmount = maxBlur * (1 - normalizedY); // More blur when shallower
                    elem.style.filter = `blur(${blurAmount}px)`;

                    // Ensure the background image flips correctly without flipping the entire entity div (which contains controls)
                    elem.style.setProperty('transform', `${transform} scale(${depthScale})`);
                    elem.style.setProperty('transform-origin', 'center center'); // Ensure rotation/scale is from center
                    elem.style.setProperty('transform-style', 'preserve-3d'); // For 3D transformations

                    // Apply the scaleX directly to the background image for flipping the fish itself
                    elem.style.setProperty('-webkit-mask-image', `url(${entity.data.path})`);
                    elem.style.setProperty('mask-image', `url(${entity.data.path})`);
                    elem.style.setProperty('background-image', 'none'); // Remove original background-image
                    elem.style.setProperty('background-color', 'transparent'); // Ensure no background color shows through mask
                    elem.style.setProperty('-webkit-mask-size', 'contain');
                    elem.style.setProperty('mask-size', 'contain');
                    elem.style.setProperty('-webkit-mask-repeat', 'no-repeat');
                    elem.style.setProperty('mask-repeat', 'no-repeat');
                    elem.style.setProperty('-webkit-mask-position', 'center');
                    elem.style.setProperty('mask-position', 'center');

                } else {
                    elem.style.transform = `translate(${entity.x}px, ${entity.y}px) scale(${entity.scale})`;
                }
            };


            return {
                createEntity,
                removeEntity,
                updateEntityPosition,
                updateEntityZIndex,
                setSelectedEntity,
                getSelectedEntity,
                getAllEntities,
                clearEntities,
                applyEntityTransform // Expose for initial setup and updates
            };
        })();

        // --- Module: UIController ---
        // Manages all UI elements, panels, modals, and toasts.
        const UIController = (() => {
            const elements = {
                aquariumContainer: document.getElementById('aquarium-container'),
                background: document.getElementById('background'),
                shopPanel: document.getElementById('shop-panel'),
                shopToggleBtn: document.getElementById('shop-toggle-btn'),
                shopCloseBtn: document.getElementById('shop-close-btn'),
                shopTabButtons: document.querySelectorAll('.shop-tab-button'),
                fishShopContent: document.getElementById('fish-shop-content').querySelector('.shop-item-grid'),
                ornamentsShopContent: document.getElementById('ornaments-shop-content').querySelector('.shop-item-grid'),
                quantityModal: document.getElementById('quantity-modal'),
                modalItemName: document.getElementById('modal-item-name'),
                quantityInput: document.getElementById('quantity-input'),
                confirmQuantityBtn: document.getElementById('confirm-quantity-btn'),
                cancelQuantityBtn: document.getElementById('cancel-quantity-btn'),
                saveBtn: document.getElementById('save-btn'),
                loadBtn: document.getElementById('load-btn'),
                resetBtn: document.getElementById('reset-btn'),
                musicToggleBtn: document.getElementById('music-toggle-btn'),
                backgroundMusic: document.getElementById('background-music'),
                toastContainer: document.getElementById('toast-container'),
                entityLayer: document.getElementById('entity-layer')
            };

            let activeShopTab = 'fish';
            let currentShopSelection = null; // { type: 'fish', id: 'fish1' }

            const init = () => {
                setupEventListeners();
                loadShopItems();
                setRandomBackground();
                elements.musicToggleBtn.classList.add(elements.backgroundMusic.paused ? '' : 'active');
                elements.musicToggleBtn.innerHTML = elements.backgroundMusic.paused ? '<span class="icon">🔇</span> Music OFF' : '<span class="icon">🎵</span> Music ON';
            };

            const setupEventListeners = () => {
                elements.shopToggleBtn.addEventListener('click', toggleShopPanel);
                elements.shopCloseBtn.addEventListener('click', toggleShopPanel);
                elements.shopTabButtons.forEach(button => {
                    button.addEventListener('click', (e) => switchShopTab(e.target.dataset.tab));
                });
                elements.confirmQuantityBtn.addEventListener('click', () => {
                    const quantity = parseInt(elements.quantityInput.value, 10);
                    if (currentShopSelection && !isNaN(quantity) && quantity > 0) {
                        spawnItems(currentShopSelection.id, quantity);
                        hideModal();
                    } else {
                        showToast('Invalid quantity!', 'error');
                    }
                });
                elements.cancelQuantityBtn.addEventListener('click', hideModal);
                elements.saveBtn.addEventListener('click', InputHandler.saveAquarium);
                elements.loadBtn.addEventListener('click', InputHandler.loadAquarium);
                elements.resetBtn.addEventListener('click', () => {
                    if (confirm('Are you sure you want to reset the aquarium? All items will be deleted.')) {
                        EntityManager.clearEntities();
                        InputHandler.saveAquarium(); // Save empty state
                        showToast('Aquarium reset!', 'info');
                    }
                });
                elements.musicToggleBtn.addEventListener('click', toggleMusic);
            };

            const setRandomBackground = () => {
                const bg = ASSET_CONFIG.backgrounds[Math.floor(Math.random() * ASSET_CONFIG.backgrounds.length)];
                if (bg) {
                    elements.background.style.backgroundImage = `url(${bg.path})`;
                }
            };

            const toggleShopPanel = () => {
                elements.shopPanel.classList.toggle('open');
                elements.shopToggleBtn.classList.toggle('active', elements.shopPanel.classList.contains('open'));
            };

            const switchShopTab = (tabId) => {
                elements.shopTabButtons.forEach(btn => btn.classList.remove('active'));
                document.querySelector(`.shop-tab-button[data-tab="${tabId}"]`).classList.add('active');

                document.querySelectorAll('.shop-content').forEach(content => content.classList.remove('active'));
                document.getElementById(`${tabId}-shop-content`).classList.add('active');
                activeShopTab = tabId;
            };

            const loadShopItems = () => {
                // Fish
                elements.fishShopContent.innerHTML = '';
                AssetManager.getAssetsByType('fishes').forEach(fish => {
                    const itemDiv = createShopItemElement(fish, 'fish');
                    elements.fishShopContent.appendChild(itemDiv);
                });

                // Ornaments
                elements.ornamentsShopContent.innerHTML = '';
                AssetManager.getAssetsByType('ornaments').forEach(ornament => {
                    const itemDiv = createShopItemElement(ornament, 'ornament');
                    elements.ornamentsShopContent.appendChild(itemDiv);
                });
            };

            const createShopItemElement = (item, type) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'shop-item';
                itemDiv.dataset.id = item.id;
                itemDiv.dataset.type = type;

                const img = document.createElement('img');
                img.src = item.path;
                img.alt = item.name;
                img.loading = 'lazy'; // Lazy load shop images

                const nameSpan = document.createElement('span');
                nameSpan.textContent = item.name;

                itemDiv.appendChild(img);
                itemDiv.appendChild(nameSpan);

                itemDiv.addEventListener('click', () => showQuantityModal(item.id, item.name, type));
                return itemDiv;
            };

            const showQuantityModal = (assetId, name, type) => {
                currentShopSelection = { id: assetId, type: type };
                elements.modalItemName.textContent = `Add ${name}`;
                elements.quantityInput.value = 1;
                elements.quantityModal.classList.add('active');
            };

            const hideModal = () => {
                elements.quantityModal.classList.remove('active');
                currentShopSelection = null;
            };

            const spawnItems = (assetId, quantity) => {
                const aquariumWidth = elements.aquariumContainer.clientWidth;
                const aquariumHeight = elements.aquariumContainer.clientHeight;

                for (let i = 0; i < quantity; i++) {
                    const asset = AssetManager.getAsset(assetId);
                    const randomScale = asset.minScale + Math.random() * (asset.maxScale - asset.minScale);

                    const entityWidth = asset.width * randomScale;
                    const entityHeight = asset.height * randomScale;

                    // Ensure entity spawns fully within bounds
                    const x = Math.random() * (aquariumWidth - entityWidth);
                    const y = Math.random() * (aquariumHeight - entityHeight);

                    const zIndex = asset.isFixed ? Math.floor(y + entityHeight / 2) : Math.floor(y + entityHeight / 2) + 500; // Z-index based on Y-position for depth illusion
                    EntityManager.createEntity(assetId, x, y, randomScale, zIndex);
                }
                showToast(`${quantity} ${AssetManager.getAsset(assetId).name}(s) added!`, 'success');
            };

            const showToast = (message, type = 'info', duration = 3000) => {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                elements.toastContainer.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });

                setTimeout(() => {
                    toast.classList.remove('show');
                    toast.addEventListener('transitionend', () => toast.remove());
                }, duration);
            };

            const toggleMusic = () => {
                if (elements.backgroundMusic.paused) {
                    elements.backgroundMusic.play().then(() => {
                        elements.musicToggleBtn.classList.add('active');
                        elements.musicToggleBtn.innerHTML = '<span class="icon">🎵</span> Music ON';
                        showToast('Music ON', 'info');
                    }).catch(error => {
                        console.error('Autoplay prevented:', error);
                        showToast('Music autoplay prevented. Please interact with the page.', 'error');
                    });
                } else {
                    elements.backgroundMusic.pause();
                    elements.musicToggleBtn.classList.remove('active');
                    elements.musicToggleBtn.innerHTML = '<span class="icon">🔇</span> Music OFF';
                    showToast('Music OFF', 'info');
                }
            };

            return {
                init,
                showToast,
                toggleShopPanel,
                hideModal, // Expose for external calls if needed
                getElements: () => elements // For InputHandler to access DOM elements
            };
        })();

        // --- Module: InputHandler ---
        // Manages all user input (mouse, touch) for dragging, scaling, and controls.
        const InputHandler = (() => {
            let activeDrag = null; // { entity: Entity, startX: number, startY: number, startEntityX: number, startEntityY: number, mode: 'drag' | 'resize' }
            let initialPinchDistance = 0;
            const elements = UIController.getElements(); // Access UI elements

            const init = () => {
                addGlobalEventListeners();
                addEntityLayerEventListeners();
            };

            const addGlobalEventListeners = () => {
                document.addEventListener('pointerdown', handlePointerDown);
                document.addEventListener('pointermove', handlePointerMove);
                document.addEventListener('pointerup', handlePointerUp);
                document.addEventListener('keydown', handleKeyDown);

                elements.aquariumContainer.addEventListener('wheel', handleWheel, { passive: false });
            };

            const addEntityLayerEventListeners = () => {
                // Using event delegation for entity interactions
                elements.entityLayer.addEventListener('pointerdown', (e) => {
                    const target = e.target.closest('.aquarium-entity');
                    if (target) {
                        e.stopPropagation(); // Prevent container from capturing event
                        handleEntityPointerDown(e);
                    }
                });

                elements.entityLayer.addEventListener('click', (e) => {
                    const target = e.target.closest('.aquarium-entity');
                    if (!target) {
                        EntityManager.setSelectedEntity(null); // Deselect if clicking empty space
                    }
                });

                // Control icons within entities
                elements.entityLayer.addEventListener('click', (e) => {
                    const controlIcon = e.target.closest('.control-icon');
                    if (controlIcon) {
                        e.stopPropagation(); // Prevent entity drag/selection
                        handleControlIconClick(controlIcon);
                    }
                });
            };

            const handlePointerDown = (e) => {
                if (e.button === 2) return; // Ignore right-click

                const entityElement = e.target.closest('.aquarium-entity');
                if (!entityElement) {
                    EntityManager.setSelectedEntity(null); // Deselect if clicking outside an entity
                    return;
                }

                const entity = EntityManager.getAllEntities().find(ent => ent.element === entityElement);
                if (!entity) return;

                EntityManager.setSelectedEntity(entity);

                let mode = 'drag';
                if (e.target.classList.contains('resize-handle')) {
                    mode = 'resize';
                    e.stopPropagation(); // Prevent dragging the entity itself when resizing
                }

                activeDrag = {
                    entity: entity,
                    startX: e.clientX,
                    startY: e.clientY,
                    startEntityX: entity.x,
                    startEntityY: entity.y,
                    startScale: entity.scale,
                    mode: mode,
                    pointerId: e.pointerId
                };

                entityElement.classList.add('dragging');
                entityElement.setPointerCapture(e.pointerId);
            };

            const handlePointerMove = (e) => {
                if (!activeDrag || e.pointerId !== activeDrag.pointerId) return;

                const aquariumRect = elements.aquariumContainer.getBoundingClientRect();
                const currentX = e.clientX - aquariumRect.left;
                const currentY = e.clientY - aquariumRect.top;

                if (activeDrag.mode === 'drag') {
                    const deltaX = currentX - activeDrag.startX;
                    const deltaY = currentY - activeDrag.startY;

                    let newX = activeDrag.startEntityX + deltaX;
                    let newY = activeDrag.startEntityY + deltaY;

                    // Boundary checks
                    newX = Math.max(0, Math.min(newX, aquariumRect.width - activeDrag.entity.element.offsetWidth));
                    newY = Math.max(0, Math.min(newY, aquariumRect.height - activeDrag.entity.element.offsetHeight));

                    EntityManager.updateEntityPosition(activeDrag.entity.id, newX, newY);

                    // Update Z-index based on Y-position for depth illusion
                    const newZIndex = activeDrag.entity.data.isFixed ? Math.floor(newY + activeDrag.entity.element.offsetHeight / 2) : Math.floor(newY + activeDrag.entity.element.offsetHeight / 2) + 500;
                    EntityManager.updateEntityZIndex(activeDrag.entity.id, newZIndex);

                } else if (activeDrag.mode === 'resize') {
                    const deltaY = activeDrag.startY - currentY; // Moving mouse up increases scale
                    let newScale = activeDrag.startScale * (1 + deltaY * 0.005); // Adjust sensitivity

                    // Clamp scale within min/max defined in asset config
                    const asset = activeDrag.entity.data;
                    newScale = Math.max(asset.minScale || 0.5, Math.min(newScale, asset.maxScale || 2.0));

                    // Keep item centered while resizing
                    const oldWidth = asset.width * activeDrag.startScale;
                    const oldHeight = asset.height * activeDrag.startScale;
                    const newWidth = asset.width * newScale;
                    const newHeight = asset.height * newScale;

                    const newX = activeDrag.startEntityX + (oldWidth - newWidth) / 2;
                    const newY = activeDrag.startEntityY + (oldHeight - newHeight) / 2;

                    EntityManager.updateEntityPosition(activeDrag.entity.id, newX, newY, newScale);
                }
            };

            const handlePointerUp = (e) => {
                if (!activeDrag || e.pointerId !== activeDrag.pointerId) return;

                activeDrag.entity.element.classList.remove('dragging');
                activeDrag.entity.element.releasePointerCapture(e.pointerId);
                activeDrag = null;
            };

            const handleEntityPointerDown = (e) => {
                 // Already handled by global pointerdown, ensures entity selection and drag mode setting.
                 // This function mostly exists to prevent bubbling further up if an entity is clicked.
            };

            const handleControlIconClick = (iconElement) => {
                const action = iconElement.dataset.action;
                const entityElement = iconElement.closest('.aquarium-entity');
                const entityId = parseInt(entityElement.dataset.id);
                const entity = EntityManager.getAllEntities().find(e => e.id === entityId);

                if (!entity) return;

                switch (action) {
                    case 'delete':
                        EntityManager.removeEntity(entity.id);
                        break;
                    case 'resize':
                        // Resize is handled by drag logic on the icon itself, this click won't do anything specific
                        // The pointerdown on the resize-handle already sets activeDrag.mode to 'resize'
                        break;
                }
            };


            const handleWheel = (e) => {
                // Scale currently selected entity
                const selected = EntityManager.getSelectedEntity();
                if (selected && !selected.data.isFixed) { // Only scale fish with wheel, not fixed ornaments
                    e.preventDefault(); // Prevent page scroll
                    const asset = selected.data;
                    const scaleChange = e.deltaY * -0.001; // Positive for scroll up, negative for scroll down
                    let newScale = selected.scale + scaleChange;

                    newScale = Math.max(asset.minScale || 0.5, Math.min(newScale, asset.maxScale || 2.0));

                    // Keep entity centered during scaling
                    const oldWidth = asset.width * selected.scale;
                    const oldHeight = asset.height * selected.scale;
                    const newWidth = asset.width * newScale;
                    const newHeight = asset.height * newScale;

                    const newX = selected.x + (oldWidth - newWidth) / 2;
                    const newY = selected.y + (oldHeight - newHeight) / 2;

                    EntityManager.updateEntityPosition(selected.id, newX, newY, newScale);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    const selected = EntityManager.getSelectedEntity();
                    if (selected) {
                        EntityManager.removeEntity(selected.id);
                        EntityManager.setSelectedEntity(null);
                    }
                }
            };

            const saveAquarium = () => {
                const entitiesData = EntityManager.getAllEntities().map(entity => ({
                    assetId: entity.assetId,
                    x: entity.x,
                    y: entity.y,
                    scale: entity.scale,
                    zIndex: entity.zIndex
                }));
                try {
                    localStorage.setItem('aquariumState', JSON.stringify(entitiesData));
                    UIController.showToast('Aquarium saved!', 'success');
                } catch (e) {
                    console.error("Failed to save aquarium state:", e);
                    UIController.showToast('Failed to save aquarium.', 'error');
                }
            };

            const loadAquarium = () => {
                try {
                    const savedState = localStorage.getItem('aquariumState');
                    if (savedState) {
                        EntityManager.clearEntities(); // Clear current state before loading
                        const entitiesData = JSON.parse(savedState);
                        entitiesData.forEach(data => {
                            EntityManager.createEntity(data.assetId, data.x, data.y, data.scale, data.zIndex);
                        });
                        UIController.showToast('Aquarium loaded!', 'success');
                    } else {
                        UIController.showToast('No saved aquarium found.', 'info');
                    }
                } catch (e) {
                    console.error("Failed to load aquarium state:", e);
                    UIController.showToast('Failed to load aquarium.', 'error');
                }
            };

            return {
                init,
                saveAquarium,
                loadAquarium
            };
        })();

        // --- Module: AnimationEngine ---
        // Manages the main game loop and all animations (fish, bubbles).
        const AnimationEngine = (() => {
            let lastTime = 0;
            const aquariumContainer = document.getElementById('aquarium-container');
            const bubbleContainer = document.getElementById('bubble-container');
            let bubbleCount = 0;

            const init = () => {
                requestAnimationFrame(gameLoop);
                setInterval(spawnBubble, 500); // Spawn bubbles periodically
            };

            const gameLoop = (currentTime) => {
                const deltaTime = currentTime - lastTime;
                lastTime = currentTime;

                if (deltaTime > 100) { // Cap delta time to prevent physics anomalies after long pauses
                    console.warn('Long frame detected, capping deltaTime.');
                    // deltaTime = 16; // Or a reasonable fixed value
                }

                updateFishAnimations(deltaTime);
                // Bubble animations are handled by CSS

                requestAnimationFrame(gameLoop);
            };

            const updateFishAnimations = (deltaTime) => {
                const entities = EntityManager.getAllEntities();
                const containerWidth = aquariumContainer.clientWidth;
                const containerHeight = aquariumContainer.clientHeight;

                entities.filter(e => e.isFish && !e.element.classList.contains('dragging')).forEach(fish => {
                    // Random idle pauses
                    if (fish.isIdling) {
                        fish.idleTimer -= deltaTime;
                        if (fish.idleTimer <= 0) {
                            fish.isIdling = false;
                            fish.speed = fish.data.speed.min + Math.random() * (fish.data.speed.max - fish.data.speed.min); // Reset speed
                            fish.direction = Math.random() < 0.5 ? 1 : -1; // Pick new direction
                        }
                    } else {
                        // Movement
                        const moveAmount = (fish.speed * deltaTime) / 16; // Normalize speed by frame rate
                        fish.x += moveAmount * fish.direction;
                        fish.y = fish.offsetY + Math.sin(currentTime * fish.frequency + fish.id) * fish.amplitude;

                        // Slight tilt based on direction
                        fish.tilt = fish.direction === 1 ? -5 : 5; // Tilt slightly opposite to direction of movement

                        // Boundary checks and direction flip
                        if (fish.x + fish.element.offsetWidth >= containerWidth && fish.direction === 1) {
                            fish.direction = -1;
                            fish.isIdling = true;
                            fish.idleTimer = fish.maxIdleTime;
                        } else if (fish.x <= 0 && fish.direction === -1) {
                            fish.direction = 1;
                            fish.isIdling = true;
                            fish.idleTimer = fish.maxIdleTime;
                        }

                        // Y-axis boundary for sine wave
                        if (fish.y <= 0 || fish.y + fish.element.offsetHeight >= containerHeight) {
                            fish.offsetY = Math.max(0, Math.min(fish.y, containerHeight - fish.element.offsetHeight));
                            fish.amplitude *= -1; // Reverse sine wave
                        }
                    }

                    // Apply updated transform
                    EntityManager.applyEntityTransform(fish);
                });
            };

            const spawnBubble = () => {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 10 + 5; // 5 to 15px
                const startX = Math.random() * aquariumContainer.clientWidth;
                const duration = Math.random() * 10 + 5; // 5 to 15 seconds
                const delay = Math.random() * 2; // 0 to 2 seconds delay
                const drift = Math.random() * 40 - 20; // -20 to 20px horizontal drift

                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${startX}px`;
                bubble.style.bottom = `-20px`; // Start below viewport
                bubble.style.animationDuration = `${duration}s`;
                bubble.style.animationDelay = `${delay}s`;
                bubble.style.setProperty('--bubble-scale', Math.random() * 0.5 + 0.7); // Scale variation
                bubble.style.setProperty('--bubble-drift', `${drift}px`); // Horizontal drift

                bubbleContainer.appendChild(bubble);
                bubbleCount++;

                // Remove old bubbles to prevent DOM bloat
                if (bubbleCount > 200) { // Keep max 200 bubbles
                    bubbleContainer.removeChild(bubbleContainer.firstElementChild);
                    bubbleCount--;
                }
            };

            return {
                init
            };
        })();

        // --- Main Application Initialization ---
        // Ensure all assets are loaded before initializing game modules.
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await AssetManager.loadAllAssets();
                console.log('All assets loaded successfully!');

                UIController.init();
                InputHandler.init();
                AnimationEngine.init();

                // Initial load of aquarium state
                InputHandler.loadAquarium();

                // Start background music (will likely require user interaction to play due to autoplay policies)
                const music = UIController.getElements().backgroundMusic;
                music.volume = 0.3; // Set a default volume
                if (localStorage.getItem('musicMuted') === 'true') {
                    music.muted = true;
                    UIController.getElements().musicToggleBtn.classList.remove('active');
                    UIController.getElements().musicToggleBtn.innerHTML = '<span class="icon">🔇</span> Music OFF';
                } else {
                    music.muted = false; // Ensure it's not muted if user previously unmuted
                    music.play().catch(e => console.log('Music autoplay prevented:', e));
                }

            } catch (error) {
                console.error('Failed to load assets or initialize application:', error);
                UIController.showToast('Failed to load aquarium assets!', 'error', 10000);
            }
        });

        // Basic persistence versioning (optional)
        const APP_VERSION = '1.0.0';
        if (localStorage.getItem('appVersion') !== APP_VERSION) {
            console.log(`Aquarium version mismatch. Updating from ${localStorage.getItem('appVersion')} to ${APP_VERSION}`);
            // Here you would add migration logic if your saved state changes significantly
            // For now, we'll just update the version and let existing data stay if compatible
            localStorage.setItem('appVersion', APP_VERSION);
        }

        // Debug Mode Toggle (optional)
        window.toggleDebugMode = () => {
            document.body.classList.toggle('debug-mode');
            console.log('Debug mode toggled:', document.body.classList.contains('debug-mode'));
            if (document.body.classList.contains('debug-mode')) {
                UIController.showToast('Debug Mode ON', 'info');
            } else {
                UIController.showToast('Debug Mode OFF', 'info');
            }
        };
        // Add a button or hotkey for this in a real scenario
        // Example: document.addEventListener('keydown', (e) => { if (e.key === 'D') toggleDebugMode(); });
    </script>
